// ─── QR / BARCODE ───────────────────────────────────────────────────────────
function generateQRMatrix(text) {
  const size = 21;
  const matrix = Array.from({ length: size }, () => Array(size).fill(false));
  const addFinder = (r, c) => { for (let i = 0; i < 7; i++) for (let j = 0; j < 7; j++) { if (i === 0 || i === 6 || j === 0 || j === 6 || (i >= 2 && i <= 4 && j >= 2 && j <= 4)) if (r + i < size && c + j < size) matrix[r + i][c + j] = true; } };
  addFinder(0, 0); addFinder(0, 14); addFinder(14, 0);
  let hash = 0;
  for (let i = 0; i < text.length; i++) hash = ((hash << 5) - hash + text.charCodeAt(i)) | 0;
  for (let i = 8; i < size; i++) for (let j = 8; j < size; j++) { if (i < 14 || j < 14) matrix[i][j] = ((hash >>> ((i * size + j) % 31)) & 1) === 1; }
  for (let i = 8; i < 13; i++) { matrix[6][i] = i % 2 === 0; matrix[i][6] = i % 2 === 0; }
  return matrix;
}

const QRCode = ({ text, size = 120 }) => {
  const matrix = generateQRMatrix(text); const cellSize = size / 21;
  return (<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}><rect width={size} height={size} fill="white" />{matrix.map((row, i) => row.map((cell, j) => cell ? (<rect key={`${i}-${j}`} x={j * cellSize} y={i * cellSize} width={cellSize} height={cellSize} fill="black" />) : null))}</svg>);
};

const Barcode = ({ text, width = 200, height = 60 }) => {
  let hash = 0; for (let i = 0; i < text.length; i++) hash = ((hash << 5) - hash + text.charCodeAt(i)) | 0;
  const bars = []; const barWidth = width / 60;
  for (let i = 0; i < 60; i++) { const isBlack = ((hash >>> (i % 31)) & 1) === 1 || i < 3 || i > 56 || (i > 28 && i < 32); if (isBlack) bars.push(<rect key={i} x={i * barWidth} y={0} width={barWidth * 0.8} height={height} fill="black" />); }
  return (<svg width={width} height={height + 20} viewBox={`0 0 ${width} ${height + 20}`}><rect width={width} height={height + 20} fill="white" />{bars}<text x={width / 2} y={height + 14} textAnchor="middle" fontSize="10" fontFamily={MONO} fill="black">{text}</text></svg>);
};

// ─── PRINT HELPER (iframe-based, works in sandboxed environments) ────────
const PRINT_STYLES = `* { box-sizing: border-box; margin:0; padding:0; } body { font-family: 'Segoe UI', Arial, sans-serif; padding: 24px; color: #111; font-size:13px; } table { width:100%; border-collapse:collapse; margin:10px 0; } th, td { border:1px solid #ccc; padding:8px 12px; text-align:left; font-size:13px; } th { background:#f5f5f5; font-weight:600; } h1 { font-size:20px; margin-bottom:4px; } h2 { font-size:15px; margin:16px 0 8px; color:#333; border-bottom:1px solid #ddd; padding-bottom:4px; } .header { display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #111; padding-bottom:12px; margin-bottom:16px; } .meta { font-size:12px; color:#666; } .badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:700; } .acc-list { margin:4px 0; padding-left:18px; } .acc-list li { font-size:12px; margin:2px 0; } @media print { body { padding: 10px; } }`;

// Global print preview state holder
let _showPrintPreview = null;
let _setPrintPreview = null;

const printContent = (htmlContent, title) => {
  // Method 1: Try iframe print
  try {
    const iframe = document.createElement("iframe");
    iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:800px;height:600px;border:none;";
    document.body.appendChild(iframe);
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    doc.open();
    doc.write(`<!DOCTYPE html><html><head><title>${title}</title><style>${PRINT_STYLES}</style></head><body>${htmlContent}</body></html>`);
    doc.close();
    setTimeout(() => {
      try {
        iframe.contentWindow.focus();
        iframe.contentWindow.print();
      } catch (e) {
        // If iframe print blocked, show preview
        if (_setPrintPreview) _setPrintPreview({ html: htmlContent, title });
      }
      setTimeout(() => { try { document.body.removeChild(iframe); } catch(e) {} }, 2000);
    }, 400);
  } catch (e) {
    // Fallback: show print preview modal
    if (_setPrintPreview) _setPrintPreview({ html: htmlContent, title });
  }
};

  if (!user) return <LoginScreen users={users} onLogin={setUser} />;

  const navItems = [
    { id: "dashboard", label: "Dashboard", icon: Icons.dashboard, access: ["admin", "manager", "front_desk"] },
    { id: "jobs", label: "Job Sheets", icon: Icons.jobs, access: ["admin", "manager", "front_desk", "technician"] },
    { id: "customers", label: "Customers", icon: Icons.customers, access: ["admin", "manager", "front_desk"] },
    { id: "devices", label: "Equipment", icon: Icons.devices, access: ["admin", "manager", "front_desk"] },
    { id: "inventory", label: "Inventory", icon: Icons.inventory, access: ["admin", "manager", "front_desk"] },
    { id: "print", label: "Print Center", icon: Icons.print, access: ["admin", "manager", "front_desk"] },
    { id: "accounts", label: "Accounts", icon: Icons.accounts, access: ["admin", "manager"] },
    { id: "backup", label: "Data Backup", icon: Icons.backup, access: ["admin"] },
    { id: "users", label: "User Mgmt", icon: Icons.users, access: ["admin"] },
    { id: "settings", label: "Settings", icon: Icons.settings, access: ["admin", "manager"] },
  ].filter(n => n.access.includes(user.role));

  const techJobs = user.role === ROLES.TECHNICIAN ? jobs.filter(j => j.assignedTo === user.id) : jobs;
  const getCustomer = id => customers.find(c => c.id === id);
  const getUser = id => users.find(u => u.id === id);
  const getDevice = id => deviceCategories.find(d => d.id === id);
  const technicians = users.filter(u => u.role === ROLES.TECHNICIAN);

  const handleCreateJob = (data) => {
    const newJob = { ...data, id: nextJobId, status: "Created", createdAt: new Date().toISOString(), createdBy: user.id, inspectionReport: "", estimate: 0, notes: "" };
    setJobs(prev => [...prev, newJob]);
    setShowModal(null);
    showToast(`Job ${nextJobId} created successfully`);
  };

  const handleUpdateJob = (jobId, updates) => {
    setJobs(prev => prev.map(j => j.id === jobId ? { ...j, ...updates } : j));
    showToast(`Job ${jobId} updated`);
  };

  const handleAddCustomer = (data) => {
    setCustomers(prev => [...prev, { ...data, id: "c" + (prev.length + 1) }]);
    setShowModal(null);
    showToast("Customer added");
  };

  const handleAddDeviceCategory = (data) => {
    setDeviceCategories(prev => [...prev, { ...data, id: "dc" + (prev.length + 1) }]);
    setShowModal(null);
    showToast("Equipment category added");
  };

  const handlePrintJobSheet = (job) => {
    const cust = getCustomer(job.customerId); const dev = getDevice(job.deviceCategory); const tech = getUser(job.assignedTo);
    const allAcc = [...(job.accessories || []), ...(job.customAccessories ? [job.customAccessories] : [])];
    const html = `<div class="header"><div><h1>SERVICE JOB SHEET</h1><div class="meta">Industrial Electrical & Automation Service Center</div></div><div style="text-align:right"><div style="font-size:20px;font-weight:700;font-family:monospace">${job.id}</div><div class="meta">${new Date(job.createdAt).toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" })}</div><div class="badge" style="background:${job.serviceType === "On-Site" ? "#f59e0b22" : "#22d3ee22"};color:${job.serviceType === "On-Site" ? "#d97706" : "#0891b2"};margin-top:4px">${job.serviceType || "Carry-In"}</div></div></div>
      <h2>Customer Details</h2>
      <table><tr><th width="15%">Company</th><td width="35%">${cust?.name || "—"}</td><th width="15%">Contact</th><td width="35%">${cust?.contactPerson || "—"}</td></tr><tr><th>Phone</th><td>${cust?.phone || "—"}</td><th>GST No.</th><td style="font-family:monospace;font-weight:600">${cust?.gstNo || "N/A"}</td></tr><tr><th>Email</th><td>${cust?.email || "—"}</td><th>Address</th><td>${cust?.address || "—"}</td></tr></table>
      <h2>Equipment Details</h2>
      <table><tr><th>Category</th><td>${dev?.icon} ${dev?.name || "—"}</td><th>Make</th><td>${job.deviceBrand}</td></tr><tr><th>Model</th><td>${job.deviceModel}</td><th>Serial No.</th><td style="font-family:monospace">${job.serialNumber}</td></tr></table>
      ${allAcc.length > 0 ? `<h2>Accessories Received</h2><ul class="acc-list">${allAcc.map(a => `<li>${a}</li>`).join("")}</ul>` : ""}
      <h2>Service Details</h2>
      <table><tr><th>Problem</th><td colspan="3">${job.problemDescription}</td></tr><tr><th>Assigned To</th><td>${tech?.name || "Unassigned"}</td><th>Status</th><td><span class="badge" style="background:${STATUS_COLORS[job.status]}22;color:${STATUS_COLORS[job.status]}">${job.status}</span></td></tr>${job.inspectionReport ? `<tr><th>Inspection</th><td colspan="3">${job.inspectionReport}</td></tr>` : ""}${job.estimate ? `<tr><th>Estimate</th><td colspan="3">₹${job.estimate.toLocaleString("en-IN")}</td></tr>` : ""}${job.notes ? `<tr><th>Notes</th><td colspan="3">${job.notes}</td></tr>` : ""}</table>
      <div style="margin-top:40px;display:flex;justify-content:space-between"><div><div style="border-top:1px solid #999;width:200px;margin-top:40px;padding-top:4px;font-size:12px">Customer Signature & Stamp</div></div><div><div style="border-top:1px solid #999;width:200px;margin-top:40px;padding-top:4px;font-size:12px">Authorized Signature</div></div></div>`;
    printContent(html, `Job Sheet - ${job.id}`);
  };

  const renderPage = () => {
    switch (page) {
      case "dashboard": return <DashboardPage jobs={techJobs} customers={customers} technicians={technicians} getCustomer={getCustomer} getUser={getUser} getDevice={getDevice} user={user} setPage={setPage} />;
      case "jobs": return <JobsPage jobs={techJobs} user={user} search={search} setSearch={setSearch} customers={customers} deviceCategories={deviceCategories} technicians={technicians} getCustomer={getCustomer} getUser={getUser} getDevice={getDevice} onCreateJob={() => setShowModal("createJob")} onViewJob={j => { setModalData(j); setShowModal("viewJob"); }} onUpdateJob={handleUpdateJob} onPrintJob={handlePrintJobSheet} onPrintLabel={j => { setModalData(j); setShowModal("printLabel"); }} />;
      case "customers": return <CustomersPage customers={customers} jobs={jobs} search={search} setSearch={setSearch} onAdd={() => setShowModal("addCustomer")} />;
      case "devices": return <DevicesPage categories={deviceCategories} jobs={jobs} onAdd={() => setShowModal("addDevice")} />;
      case "inventory": return <InventoryPage inventory={inventory} setInventory={setInventory} stores={stores} setStores={setStores} deviceCategories={deviceCategories} showToast={showToast} />;
      case "print": return <PrintCenterPage printerSettings={printerSettings} onUpdate={setPrinterSettings} jobs={techJobs} onPrintJob={handlePrintJobSheet} onPrintLabel={j => { setModalData(j); setShowModal("printLabel"); }} getCustomer={getCustomer} getDevice={getDevice} />;
      case "accounts": return <AccountsPage invoices={invoices} setInvoices={setInvoices} challans={challans} setChallans={setChallans} jobs={jobs} customers={customers} getCustomer={getCustomer} getDevice={getDevice} companyDetails={companyDetails} showToast={showToast} />;
      case "backup": return <BackupPage jobs={jobs} customers={customers} users={users} deviceCategories={deviceCategories} printerSettings={printerSettings} showToast={showToast} setJobs={setJobs} setCustomers={setCustomers} setUsers={setUsers} setDeviceCategories={setDeviceCategories} />;
      case "users": return <UsersPage users={users} setUsers={setUsers} currentUser={user} showToast={showToast} />;
      case "settings": return <SettingsPage printerSettings={printerSettings} onUpdate={setPrinterSettings} companyDetails={companyDetails} setCompanyDetails={setCompanyDetails} theme={theme} setTheme={setTheme} showToast={showToast} />;
      default: return null;
    }
  };

  return (
    <div style={{ display: "flex", height: "100vh", fontFamily: FONT, background: C.bg, color: C.text, overflow: "hidden" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: ${C.border}; border-radius: 3px; }
        * { box-sizing: border-box; } input::placeholder, textarea::placeholder { color: ${C.textMuted}; } select option { background: ${C.surface}; color: ${C.text}; }
      `}</style>

      {/* SIDEBAR */}
      <aside style={{ width: sidebarOpen ? 250 : 64, background: C.surface, borderRight: `1px solid ${C.border}`, display: "flex", flexDirection: "column", transition: "width 0.25s ease", overflow: "hidden", flexShrink: 0 }}>
        <div style={{ padding: sidebarOpen ? "20px 20px 16px" : "20px 12px 16px", borderBottom: `1px solid ${C.border}`, display: "flex", alignItems: "center", gap: 12 }}>
          <button onClick={() => setSidebarOpen(!sidebarOpen)} style={{ background: "none", border: "none", cursor: "pointer", color: C.textDim, padding: 4 }}><Icon d={Icons.menu} size={20} /></button>
          {sidebarOpen && <div><div style={{ fontSize: 15, fontWeight: 800, color: C.accent, letterSpacing: 1.5 }}>SERVICE CRM</div><div style={{ fontSize: 10, color: C.textMuted, letterSpacing: 0.5 }}>Industrial & Automation</div></div>}
        </div>
        <nav style={{ flex: 1, padding: "12px 8px", overflowY: "auto" }}>
          {navItems.map(n => (
            <button key={n.id} onClick={() => setPage(n.id)} style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, padding: "10px 14px", borderRadius: 8, border: "none", background: page === n.id ? C.accentDim : "transparent", color: page === n.id ? C.accent : C.textDim, cursor: "pointer", fontFamily: FONT, fontSize: 13, fontWeight: page === n.id ? 600 : 500, transition: "all 0.15s", marginBottom: 2, textAlign: "left" }}>
              <Icon d={n.icon} size={18} color={page === n.id ? C.accent : C.textDim} />{sidebarOpen && n.label}
            </button>
          ))}
        </nav>
        <div style={{ padding: "12px 8px", borderTop: `1px solid ${C.border}` }}>
          {sidebarOpen && <div style={{ padding: "8px 14px", marginBottom: 4 }}><div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{user.name}</div><div style={{ fontSize: 11, color: C.textMuted }}>{ROLE_LABELS[user.role]}</div></div>}
          <button onClick={() => setShowModal("myPassword")} style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, padding: "10px 14px", borderRadius: 8, border: "none", background: "transparent", color: C.textDim, cursor: "pointer", fontFamily: FONT, fontSize: 13, fontWeight: 500, textAlign: "left", transition: "background 0.15s" }} onMouseEnter={e => e.currentTarget.style.background = C.surface2} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={C.textDim} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            {sidebarOpen && "Change Password"}
          </button>
          <button onClick={() => setUser(null)} style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, padding: "10px 14px", borderRadius: 8, border: "none", background: "transparent", color: C.danger, cursor: "pointer", fontFamily: FONT, fontSize: 13, fontWeight: 500, textAlign: "left" }}>
            <Icon d={Icons.logout} size={18} color={C.danger} />{sidebarOpen && "Logout"}
          </button>
        </div>
      </aside>

      <main style={{ flex: 1, overflow: "auto", padding: 32 }}>{renderPage()}</main>

      {showModal === "createJob" && <CreateJobModal customers={customers} deviceCategories={deviceCategories} technicians={technicians} onSubmit={handleCreateJob} onClose={() => setShowModal(null)} nextId={nextJobId} />}
      {showModal === "viewJob" && modalData && <ViewJobModal job={modalData} user={user} getCustomer={getCustomer} getUser={getUser} getDevice={getDevice} onClose={() => { setShowModal(null); setModalData(null); }} onUpdate={(u) => { handleUpdateJob(modalData.id, u); setModalData({ ...modalData, ...u }); }} onPrint={() => handlePrintJobSheet(modalData)} technicians={technicians} />}
      {showModal === "addCustomer" && <AddCustomerModal onSubmit={handleAddCustomer} onClose={() => setShowModal(null)} />}
      {showModal === "addDevice" && <AddDeviceCategoryModal onSubmit={handleAddDeviceCategory} onClose={() => setShowModal(null)} />}
      {showModal === "printLabel" && modalData && <PrintLabelModal job={modalData} settings={printerSettings.label} onClose={() => { setShowModal(null); setModalData(null); }} />}
      {showModal === "myPassword" && <MyPasswordModal user={user} users={users} setUsers={setUsers} onClose={() => setShowModal(null)} showToast={showToast} />}

      {/* PRINT PREVIEW MODAL */}
      {printPreview && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1100, padding: 20, backdropFilter: "blur(4px)" }} onClick={() => setPrintPreview(null)}>
          <div onClick={e => e.stopPropagation()} style={{ background: "#fff", borderRadius: 16, width: "100%", maxWidth: 860, maxHeight: "92vh", display: "flex", flexDirection: "column", boxShadow: "0 24px 48px rgba(0,0,0,0.5)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 24px", borderBottom: "1px solid #e5e7eb", background: "#f9fafb", borderRadius: "16px 16px 0 0" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 18 }}>🖨️</span>
                <span style={{ fontSize: 16, fontWeight: 700, color: "#111", fontFamily: FONT }}>{printPreview.title}</span>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => {
                  const printWindow = document.getElementById("print-preview-frame");
                  if (printWindow) { try { printWindow.contentWindow.focus(); printWindow.contentWindow.print(); } catch(e) {} }
                }} style={{ padding: "8px 20px", borderRadius: 8, background: "#111", color: "#fff", border: "none", fontFamily: FONT, fontSize: 14, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
                  🖨️ Print
                </button>
                <button onClick={() => setPrintPreview(null)} style={{ padding: "8px 12px", borderRadius: 8, background: "#f3f4f6", color: "#666", border: "1px solid #e5e7eb", fontFamily: FONT, fontSize: 13, cursor: "pointer" }}>✕ Close</button>
              </div>
            </div>
            <div style={{ flex: 1, overflow: "auto", padding: 0 }}>
              <iframe
                id="print-preview-frame"
                srcDoc={`<!DOCTYPE html><html><head><style>${PRINT_STYLES}</style></head><body>${printPreview.html}</body></html>`}
                style={{ width: "100%", height: "70vh", border: "none", background: "#fff" }}
                title="Print Preview"
              />
            </div>
          </div>
        </div>
      )}

      {toast && (
        <div style={{ position: "fixed", bottom: 24, right: 24, padding: "14px 24px", borderRadius: 10, background: toast.type === "success" ? C.success : toast.type === "warning" ? C.warning : C.danger, color: toast.type === "warning" ? C.bg : C.white, fontFamily: FONT, fontSize: 14, fontWeight: 600, boxShadow: "0 8px 24px rgba(0,0,0,0.4)", zIndex: 2000, animation: "slideUp 0.3s ease" }}>{toast.msg}</div>
      )}
      <style>{`@keyframes slideUp { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }`}</style>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  LOGIN
// ═══════════════════════════════════════════════════════════════════════════
function LoginScreen({ users, onLogin }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const handleLogin = () => {
    setLoading(true); setError("");
    setTimeout(() => {
      const u = users.find(u => u.email === email && u.password === password);
      if (u) onLogin(u); else { setError("Invalid email or password"); setLoading(false); }
    }, 400);
  };
  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: C.bg, fontFamily: FONT }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');`}</style>
      <div style={{ width: 420, padding: 40 }}>
        <div style={{ textAlign: "center", marginBottom: 40 }}>
          <div style={{ width: 56, height: 56, borderRadius: 14, background: C.accentDim, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px", fontSize: 28 }}>⚡</div>
          <div style={{ fontSize: 26, fontWeight: 800, color: C.accent, letterSpacing: 2, marginBottom: 4 }}>SERVICE CRM</div>
          <div style={{ fontSize: 13, color: C.textMuted }}>Industrial Electrical & Automation</div>
        </div>
        <Card>
          <div style={{ fontSize: 16, fontWeight: 700, color: C.text, marginBottom: 4 }}>Welcome back</div>
          <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 20 }}>Sign in to your account to continue</div>
          <Field label="Username"><Input type="text" value={email} onChange={e => { setEmail(e.target.value); setError(""); }} placeholder="Enter your username" autoComplete="username" /></Field>
          <Field label="Password"><Input type="password" value={password} onChange={e => { setPassword(e.target.value); setError(""); }} placeholder="Enter your password" onKeyDown={e => e.key === "Enter" && handleLogin()} autoComplete="current-password" /></Field>
          {error && <div style={{ color: C.danger, fontSize: 13, marginBottom: 12, padding: "8px 12px", background: C.danger + "12", borderRadius: 6 }}>⚠️ {error}</div>}
          <Btn onClick={handleLogin} disabled={loading || !email || !password} style={{ width: "100%", justifyContent: "center", marginTop: 8 }}>{loading ? "Signing in..." : "Sign In"}</Btn>
          <div style={{ textAlign: "center", marginTop: 20, fontSize: 11, color: C.textMuted }}>Contact your administrator if you need access</div>
        </Card>
        <div style={{ textAlign: "center", marginTop: 20, fontSize: 11, color: C.textMuted + "88" }}>Service CRM v1.0 · Industrial & Automation</div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════
function DashboardPage({ jobs, customers, technicians, getCustomer, getUser, getDevice, user, setPage }) {
  const statusCounts = STATUS_FLOW.reduce((a, s) => ({ ...a, [s]: jobs.filter(j => j.status === s).length }), {});
  const recentJobs = [...jobs].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0, 5);
  const onSiteCount = jobs.filter(j => j.serviceType === "On-Site" && !["Completed", "Delivered"].includes(j.status)).length;

  return (
    <div>
      <div style={{ marginBottom: 28 }}><h1 style={{ fontSize: 24, fontWeight: 800, margin: 0 }}>Dashboard</h1><p style={{ fontSize: 14, color: C.textDim, margin: "4px 0 0" }}>Welcome back, {user.name}</p></div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 16, marginBottom: 28 }}>
        <StatCard label="Total Jobs" value={jobs.length} color={C.accent} icon="📋" />
        <StatCard label="Active" value={jobs.filter(j => !["Completed", "Delivered"].includes(j.status)).length} color={C.warning} icon="⚡" />
        <StatCard label="On-Site Active" value={onSiteCount} color="#f97316" icon="🏭" />
        <StatCard label="Completed" value={statusCounts.Completed + statusCounts.Delivered} color={C.success} icon="✅" />
        <StatCard label="Customers" value={customers.length} color="#8b5cf6" icon="🏢" />
      </div>
      <Card style={{ marginBottom: 24 }}>
        <h3 style={{ fontSize: 15, fontWeight: 700, margin: "0 0 16px", color: C.text }}>Job Pipeline</h3>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {STATUS_FLOW.map(s => (
            <div key={s} style={{ flex: 1, minWidth: 85, padding: 12, borderRadius: 8, textAlign: "center", background: STATUS_COLORS[s] + "12", border: `1px solid ${STATUS_COLORS[s]}33` }}>
              <div style={{ fontSize: 24, fontWeight: 800, color: STATUS_COLORS[s], fontFamily: MONO }}>{statusCounts[s]}</div>
              <div style={{ fontSize: 10, color: C.textDim, fontWeight: 600, marginTop: 4 }}>{s}</div>
            </div>
          ))}
        </div>
      </Card>
      <Card>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <h3 style={{ fontSize: 15, fontWeight: 700, margin: 0, color: C.text }}>Recent Jobs</h3>
          <Btn variant="ghost" small onClick={() => setPage("jobs")}>View All →</Btn>
        </div>
        <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead><tr>{["Job ID", "Customer", "Equipment", "Type", "Status", "Date"].map(h => (<th key={h} style={{ textAlign: "left", padding: "8px 12px", fontSize: 11, fontWeight: 700, color: C.textMuted, borderBottom: `1px solid ${C.border}`, textTransform: "uppercase", letterSpacing: 0.8 }}>{h}</th>))}</tr></thead>
          <tbody>
            {recentJobs.map(j => { const cust = getCustomer(j.customerId); const dev = getDevice(j.deviceCategory); return (
              <tr key={j.id}><td style={{ padding: "10px 12px", fontFamily: MONO, fontSize: 13, fontWeight: 600, color: C.accent }}>{j.id}</td><td style={{ padding: "10px 12px", fontSize: 13 }}>{cust?.name}</td><td style={{ padding: "10px 12px", fontSize: 13 }}>{dev?.icon} {dev?.name}</td><td style={{ padding: "10px 12px" }}><Badge label={j.serviceType || "Carry-In"} color={j.serviceType === "On-Site" ? C.warning : C.accent} /></td><td style={{ padding: "10px 12px" }}><Badge label={j.status} color={STATUS_COLORS[j.status]} /></td><td style={{ padding: "10px 12px", fontSize: 12, color: C.textMuted }}>{new Date(j.createdAt).toLocaleDateString("en-IN")}</td></tr>
            ); })}
          </tbody>
        </table>
        </div>
      </Card>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  JOBS PAGE
// ═══════════════════════════════════════════════════════════════════════════
function JobsPage({ jobs, user, search, setSearch, customers, deviceCategories, technicians, getCustomer, getUser, getDevice, onCreateJob, onViewJob, onUpdateJob, onPrintJob, onPrintLabel }) {
  const [statusFilter, setStatusFilter] = useState("All");
  const [typeFilter, setTypeFilter] = useState("All");
  const filtered = jobs.filter(j => {
    const cust = getCustomer(j.customerId);
    const matchSearch = !search || j.id.toLowerCase().includes(search.toLowerCase()) || cust?.name?.toLowerCase().includes(search.toLowerCase()) || j.deviceBrand?.toLowerCase().includes(search.toLowerCase());
    return (statusFilter === "All" || j.status === statusFilter) && (typeFilter === "All" || (j.serviceType || "Carry-In") === typeFilter) && matchSearch;
  }).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24, flexWrap: "wrap", gap: 12 }}>
        <h1 style={{ fontSize: 24, fontWeight: 800, margin: 0 }}>Job Sheets</h1>
        <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
          <SearchBar value={search} onChange={setSearch} placeholder="Search jobs..." />
          <Select value={typeFilter} onChange={e => setTypeFilter(e.target.value)} style={{ width: 130 }}><option value="All">All Types</option>{SERVICE_TYPES.map(s => <option key={s} value={s}>{s}</option>)}</Select>
          <Select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} style={{ width: 150 }}><option value="All">All Status</option>{STATUS_FLOW.map(s => <option key={s} value={s}>{s}</option>)}</Select>
          {can(user.role, "create_job") && <Btn onClick={onCreateJob}><Icon d={Icons.plus} size={16} color={C.bg} /> New Job</Btn>}
        </div>
      </div>
      {filtered.length === 0 ? <EmptyState icon="📋" message="No jobs found" /> : (
        <div style={{ display: "grid", gap: 12 }}>
          {filtered.map(j => {
            const cust = getCustomer(j.customerId); const dev = getDevice(j.deviceCategory); const tech = getUser(j.assignedTo);
            const accCount = (j.accessories?.length || 0) + (j.customAccessories ? 1 : 0);
            return (
              <Card key={j.id} onClick={() => onViewJob(j)} style={{ cursor: "pointer" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12 }}>
                  <div style={{ flex: 1, minWidth: 200 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
                      <span style={{ fontFamily: MONO, fontSize: 15, fontWeight: 700, color: C.accent }}>{j.id}</span>
                      <Badge label={j.status} color={STATUS_COLORS[j.status]} />
                      <Badge label={j.serviceType || "Carry-In"} color={j.serviceType === "On-Site" ? C.warning : "#06b6d4"} />
                    </div>
                    <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 4 }}>{cust?.name || "—"}</div>
                    <div style={{ fontSize: 13, color: C.textDim }}>{dev?.icon} {dev?.name} — {j.deviceBrand} {j.deviceModel}</div>
                    {accCount > 0 && <div style={{ fontSize: 12, color: C.textMuted, marginTop: 4 }}>📎 {accCount} accessor{accCount > 1 ? "ies" : "y"} received</div>}
                  </div>
                  <div style={{ textAlign: "right", minWidth: 140 }}>
                    <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 4 }}>{new Date(j.createdAt).toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" })}</div>
                    {tech && <div style={{ fontSize: 12, color: C.textDim }}>🔧 {tech.name}</div>}
                    {j.estimate > 0 && <div style={{ fontSize: 13, fontWeight: 700, color: C.success, marginTop: 4, fontFamily: MONO }}>₹{j.estimate.toLocaleString("en-IN")}</div>}
                  </div>
                </div>
                {j.problemDescription && <div style={{ marginTop: 10, fontSize: 13, color: C.textMuted, lineHeight: 1.4, borderTop: `1px solid ${C.border}`, paddingTop: 10 }}>{j.problemDescription}</div>}
                <div style={{ display: "flex", gap: 8, marginTop: 12, justifyContent: "flex-end" }} onClick={e => e.stopPropagation()}>
                  <Btn variant="ghost" small onClick={() => onPrintJob(j)}>🖨️ Print</Btn>
                  <Btn variant="ghost" small onClick={() => onPrintLabel(j)}>🏷️ Label</Btn>
                </div>
              </Card>
            );
          })}
        </div>
      )}
    </div>
  );
}

    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24, flexWrap: "wrap", gap: 12 }}>

        <div style={{ display: "flex", gap: 12, alignItems: "center" }}><SearchBar value={search} onChange={setSearch} placeholder="Search name, GST, contact..." /><Btn onClick={onAdd}><Icon d={Icons.plus} size={16} color={C.bg} /> Add Customer</Btn></div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(340px, 1fr))", gap: 16 }}>

          return (
            <Card key={c.id}>
              <div style={{ display: "flex", gap: 14, alignItems: "center", marginBottom: 14 }}>
                <div style={{ width: 44, height: 44, borderRadius: 22, background: C.accentDim, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, fontWeight: 700, color: C.accent }}>{c.name[0]}</div>
                <div style={{ flex: 1 }}><div style={{ fontWeight: 700, fontSize: 15 }}>{c.name}</div>{c.contactPerson && <div style={{ fontSize: 12, color: C.textDim }}>👤 {c.contactPerson}</div>}</div>
              </div>
              <div style={{ fontSize: 13, color: C.textDim, marginBottom: 3 }}>📞 {c.phone} · {c.email}</div>
              <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 3 }}>{c.address}</div>
              {c.gstNo && (
                <div style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "4px 10px", background: C.surface2, borderRadius: 6, marginBottom: 10, marginTop: 6 }}>
                  <span style={{ fontSize: 10, fontWeight: 700, color: C.textMuted, letterSpacing: 0.5 }}>GST</span>
                  <span style={{ fontSize: 12, fontFamily: MONO, fontWeight: 600, color: C.text }}>{c.gstNo}</span>
                </div>
              )}
              <div style={{ display: "flex", gap: 8, marginTop: 8 }}><Badge label={`${custJobs.length} Jobs`} color={C.accent} /><Badge label={`${custJobs.filter(j => j.status === "Completed").length} Done`} color={C.success} /></div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  INVENTORY MANAGEMENT PAGE
// ═══════════════════════════════════════════════════════════════════════════
function InventoryPage({ inventory, setInventory, stores, setStores, deviceCategories, showToast }) {
  const [tab, setTab] = useState("items");
  const [search, setSearch] = useState("");
  const [showAddItem, setShowAddItem] = useState(false);
  const [showAddStore, setShowAddStore] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [storeFilter, setStoreFilter] = useState("All");
  const [catFilter, setCatFilter] = useState("All");
  const [stockFilter, setStockFilter] = useState("All");

  // Item form
  const emptyItem = { name: "", partNo: "", category: "", storeId: "", drawerNo: "", qty: 0, minQty: 1, unit: "pcs", brand: "", description: "", purchasePrice: 0, sellingPrice: 0 };
  const [itemForm, setItemForm] = useState(emptyItem);

  // Store form
  const [storeForm, setStoreForm] = useState({ name: "", location: "" });

  const getStore = id => stores.find(s => s.id === id);

  const filtered = inventory.filter(item => {
    const matchSearch = !search || item.name.toLowerCase().includes(search.toLowerCase()) || (item.partNo || "").toLowerCase().includes(search.toLowerCase()) || (item.brand || "").toLowerCase().includes(search.toLowerCase()) || (item.drawerNo || "").toLowerCase().includes(search.toLowerCase());
    const matchStore = storeFilter === "All" || item.storeId === storeFilter;
    const matchCat = catFilter === "All" || item.category === catFilter;
    const matchStock = stockFilter === "All" || (stockFilter === "Low" && item.qty <= item.minQty && item.qty > 0) || (stockFilter === "Out" && item.qty === 0) || (stockFilter === "In" && item.qty > 0);
    return matchSearch && matchStore && matchCat && matchStock;
  });

  const totalItems = inventory.length;
  const totalValue = inventory.reduce((s, i) => s + i.qty * i.purchasePrice, 0);
  const lowStock = inventory.filter(i => i.qty <= i.minQty && i.qty > 0).length;
  const outOfStock = inventory.filter(i => i.qty === 0).length;

  const handleAddItem = () => {
    if (!itemForm.name || !itemForm.storeId) return;
    if (editItem) {
      setInventory(prev => prev.map(i => i.id === editItem.id ? { ...i, ...itemForm } : i));
      showToast(`${itemForm.name} updated`);
      setEditItem(null);
    } else {
      setInventory(prev => [...prev, { ...itemForm, id: "inv" + Date.now(), createdAt: new Date().toISOString() }]);
      showToast(`${itemForm.name} added to inventory`);
    }
    setItemForm(emptyItem);
    setShowAddItem(false);
  };

  const handleDeleteItem = (item) => {
    setInventory(prev => prev.filter(i => i.id !== item.id));
    showToast(`${item.name} removed`, "warning");
  };

  const handleAddStore = () => {
    if (!storeForm.name) return;
    setStores(prev => [...prev, { ...storeForm, id: "s" + Date.now() }]);
    setStoreForm({ name: "", location: "" });
    setShowAddStore(false);
    showToast(`Store "${storeForm.name}" added`);
  };

  const handleDeleteStore = (store) => {
    const itemsInStore = inventory.filter(i => i.storeId === store.id).length;
    if (itemsInStore > 0) { showToast(`Cannot delete — ${itemsInStore} items in this store`, "error"); return; }
    setStores(prev => prev.filter(s => s.id !== store.id));
    showToast(`Store "${store.name}" removed`, "warning");
  };

  const handleQtyChange = (itemId, delta) => {
    setInventory(prev => prev.map(i => i.id === itemId ? { ...i, qty: Math.max(0, i.qty + delta) } : i));
  };

  const tabs = [
    { id: "items", label: "📦 Inventory Items" },
    { id: "stores", label: "🏪 Stores & Locations" },
  ];

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24, flexWrap: "wrap", gap: 12 }}>
        <div><h1 style={{ fontSize: 24, fontWeight: 800, margin: 0 }}>Inventory Management</h1><p style={{ fontSize: 13, color: C.textMuted, margin: "4px 0 0" }}>Parts, components & spares</p></div>
        <div style={{ display: "flex", gap: 10 }}>
          <Btn onClick={() => { setItemForm(emptyItem); setEditItem(null); setShowAddItem(true); }}><Icon d={Icons.plus} size={16} color={C.bg} /> Add Item</Btn>
          <Btn variant="secondary" onClick={() => { setStoreForm({ name: "", location: "" }); setShowAddStore(true); }}><Icon d={Icons.plus} size={16} /> Add Store</Btn>
        </div>
      </div>

      {/* Stats */}
      <div style={{ display: "flex", flexWrap: "wrap", gap: 16, marginBottom: 28 }}>
        <StatCard label="Total Items" value={totalItems} color={C.accent} icon="📦" />
        <StatCard label="Stock Value" value={`₹${totalValue > 999 ? (totalValue/1000).toFixed(1) + "k" : totalValue}`} color={C.success} icon="💰" />
        <StatCard label="Low Stock" value={lowStock} color={C.warning} icon="⚠️" />
        <StatCard label="Out of Stock" value={outOfStock} color={C.danger} icon="🚫" />
        <StatCard label="Stores" value={stores.length} color="#8b5cf6" icon="🏪" />
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 0, marginBottom: 20, borderRadius: 10, overflow: "hidden", border: `1px solid ${C.border}`, maxWidth: 440 }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: 1, padding: "10px 16px", border: "none", cursor: "pointer", fontFamily: FONT, fontSize: 13, fontWeight: 600, background: tab === t.id ? C.accent : C.surface2, color: tab === t.id ? C.bg : C.textMuted, transition: "all 0.2s" }}>{t.label}</button>
        ))}
      </div>

      {/* ITEMS TAB */}
      {tab === "items" && (
        <div>
          <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap", alignItems: "center" }}>
            <SearchBar value={search} onChange={setSearch} placeholder="Search name, part no, drawer..." />
            <Select value={storeFilter} onChange={e => setStoreFilter(e.target.value)} style={{ width: 160 }}>
              <option value="All">All Stores</option>
              {stores.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
            </Select>
            <Select value={catFilter} onChange={e => setCatFilter(e.target.value)} style={{ width: 160 }}>
              <option value="All">All Categories</option>
              {deviceCategories.map(d => <option key={d.id} value={d.id}>{d.icon} {d.name}</option>)}
            </Select>
            <Select value={stockFilter} onChange={e => setStockFilter(e.target.value)} style={{ width: 130 }}>
              <option value="All">All Stock</option>
              <option value="In">In Stock</option>
              <option value="Low">Low Stock</option>
              <option value="Out">Out of Stock</option>
            </Select>
          </div>

          {filtered.length === 0 ? <EmptyState icon="📦" message={inventory.length === 0 ? "No inventory items yet — click 'Add Item' to start" : "No items match your filters"} /> : (
            <div style={{ display: "grid", gap: 10 }}>
              {filtered.map(item => {
                const store = getStore(item.storeId);
                const cat = deviceCategories.find(d => d.id === item.category);
                const isLow = item.qty <= item.minQty && item.qty > 0;
                const isOut = item.qty === 0;
                return (
                  <Card key={item.id} style={{ borderLeft: `3px solid ${isOut ? C.danger : isLow ? C.warning : C.success}` }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12 }}>
                      <div style={{ flex: 1, minWidth: 220 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6, flexWrap: "wrap" }}>
                          <span style={{ fontWeight: 700, fontSize: 15 }}>{item.name}</span>
                          {isOut && <Badge label="Out of Stock" color={C.danger} />}
                          {isLow && !isOut && <Badge label="Low Stock" color={C.warning} />}
                          {!isLow && !isOut && <Badge label="In Stock" color={C.success} />}
                        </div>
                        <div style={{ display: "flex", gap: 16, flexWrap: "wrap", fontSize: 12, color: C.textDim, marginBottom: 4 }}>
                          {item.partNo && <span style={{ fontFamily: MONO }}>P/N: {item.partNo}</span>}
                          {item.brand && <span>Brand: {item.brand}</span>}
                          {cat && <span>{cat.icon} {cat.name}</span>}
                        </div>
                        <div style={{ display: "flex", gap: 16, flexWrap: "wrap", fontSize: 12, color: C.textMuted }}>
                          {store && <span>🏪 {store.name}</span>}
                          {item.drawerNo && <span style={{ padding: "2px 8px", background: C.surface2, borderRadius: 4, fontFamily: MONO, fontWeight: 600, color: C.accent }}>🗄️ Drawer: {item.drawerNo}</span>}
                        </div>
                        {item.description && <div style={{ fontSize: 12, color: C.textMuted, marginTop: 4 }}>{item.description}</div>}
                      </div>

                      {/* Qty & Price Section */}
                      <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
                        <div style={{ textAlign: "center" }}>
                          <div style={{ fontSize: 10, color: C.textMuted, fontWeight: 600, textTransform: "uppercase", marginBottom: 4 }}>Qty</div>
                          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                            <button onClick={() => handleQtyChange(item.id, -1)} style={{ width: 28, height: 28, borderRadius: 6, border: `1px solid ${C.border}`, background: C.surface2, color: C.text, cursor: "pointer", fontSize: 16, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center" }}>−</button>
                            <span style={{ fontFamily: MONO, fontSize: 18, fontWeight: 800, color: isOut ? C.danger : isLow ? C.warning : C.text, minWidth: 36, textAlign: "center" }}>{item.qty}</span>
                            <button onClick={() => handleQtyChange(item.id, 1)} style={{ width: 28, height: 28, borderRadius: 6, border: `1px solid ${C.border}`, background: C.surface2, color: C.text, cursor: "pointer", fontSize: 16, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center" }}>+</button>
                          </div>
                          <div style={{ fontSize: 10, color: C.textMuted, marginTop: 2 }}>{item.unit} (min: {item.minQty})</div>
                        </div>
                        {item.sellingPrice > 0 && (
                          <div style={{ textAlign: "center" }}>
                            <div style={{ fontSize: 10, color: C.textMuted, fontWeight: 600, textTransform: "uppercase", marginBottom: 4 }}>Price</div>
                            <div style={{ fontFamily: MONO, fontSize: 14, fontWeight: 700, color: C.success }}>₹{item.sellingPrice.toLocaleString("en-IN")}</div>
                          </div>
                        )}
                      </div>
                    </div>

                    <div style={{ display: "flex", gap: 8, marginTop: 10, borderTop: `1px solid ${C.border}`, paddingTop: 10, justifyContent: "flex-end" }}>
                      <Btn variant="ghost" small onClick={() => { setItemForm(item); setEditItem(item); setShowAddItem(true); }}>✏️ Edit</Btn>
                      <Btn variant="ghost" small onClick={() => handleDeleteItem(item)} style={{ color: C.danger }}>🗑️ Remove</Btn>
                    </div>
                  </Card>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* STORES TAB */}
      {tab === "stores" && (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 16 }}>
          {stores.map(store => {
            const itemCount = inventory.filter(i => i.storeId === store.id).length;
            const storeValue = inventory.filter(i => i.storeId === store.id).reduce((s, i) => s + i.qty * i.purchasePrice, 0);
            const drawers = [...new Set(inventory.filter(i => i.storeId === store.id && i.drawerNo).map(i => i.drawerNo))].sort();
            return (
              <Card key={store.id} style={{ borderLeft: `3px solid #8b5cf6` }}>
                <div style={{ display: "flex", gap: 14, alignItems: "center", marginBottom: 14 }}>
                  <div style={{ width: 48, height: 48, borderRadius: 12, background: "#8b5cf622", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24 }}>🏪</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 700, fontSize: 16 }}>{store.name}</div>
                    <div style={{ fontSize: 12, color: C.textMuted }}>{store.location || "No location set"}</div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
                  <Badge label={`${itemCount} items`} color={C.accent} />
                  {storeValue > 0 && <Badge label={`₹${storeValue.toLocaleString("en-IN")}`} color={C.success} />}
                </div>
                {drawers.length > 0 && (
                  <div style={{ marginBottom: 12 }}>
                    <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, textTransform: "uppercase", marginBottom: 6 }}>Drawers in use</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                      {drawers.map(d => (
                        <span key={d} style={{ padding: "3px 8px", background: C.accentDim, borderRadius: 4, fontSize: 11, fontFamily: MONO, fontWeight: 600, color: C.accent }}>{d}</span>
                      ))}
                    </div>
                  </div>
                )}
                <div style={{ display: "flex", gap: 8, borderTop: `1px solid ${C.border}`, paddingTop: 10 }}>
                  <Btn variant="ghost" small onClick={() => { setStoreFilter(store.id); setTab("items"); }}>View Items →</Btn>
                  <Btn variant="ghost" small onClick={() => handleDeleteStore(store)} style={{ color: C.danger }}>🗑️ Delete</Btn>
                </div>
              </Card>
            );
          })}
          {stores.length === 0 && <EmptyState icon="🏪" message="No stores yet — click 'Add Store' to create one" />}
        </div>
      )}

      {/* ADD / EDIT ITEM MODAL */}
      {showAddItem && (
        <Modal title={editItem ? `Edit — ${editItem.name}` : "Add Inventory Item"} onClose={() => { setShowAddItem(false); setEditItem(null); setItemForm(emptyItem); }} wide>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 20px" }}>
            <Field label="Item Name" required><Input value={itemForm.name} onChange={e => setItemForm({ ...itemForm, name: e.target.value })} placeholder="e.g. IGBT Module, Capacitor 470uF" /></Field>
            <Field label="Part Number"><Input value={itemForm.partNo} onChange={e => setItemForm({ ...itemForm, partNo: e.target.value.toUpperCase() })} placeholder="e.g. ACS580-IGBT-Q2" style={{ fontFamily: MONO }} /></Field>
            <Field label="Brand / Make"><Input value={itemForm.brand} onChange={e => setItemForm({ ...itemForm, brand: e.target.value })} placeholder="e.g. ABB, Siemens, Schneider" /></Field>
            <Field label="Category"><Select value={itemForm.category} onChange={e => setItemForm({ ...itemForm, category: e.target.value })}><option value="">Select Category</option>{deviceCategories.map(d => <option key={d.id} value={d.id}>{d.icon} {d.name}</option>)}</Select></Field>
            <Field label="Store / Location" required><Select value={itemForm.storeId} onChange={e => setItemForm({ ...itemForm, storeId: e.target.value })}><option value="">Select Store</option>{stores.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}</Select></Field>
            <Field label="Drawer / Shelf / Bin No."><Input value={itemForm.drawerNo} onChange={e => setItemForm({ ...itemForm, drawerNo: e.target.value.toUpperCase() })} placeholder="e.g. A1, B3, SHELF-2, BIN-05" style={{ fontFamily: MONO }} /></Field>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: "0 16px" }}>
            <Field label="Quantity"><Input type="number" min="0" value={itemForm.qty} onChange={e => setItemForm({ ...itemForm, qty: parseInt(e.target.value) || 0 })} /></Field>
            <Field label="Min Stock Level"><Input type="number" min="0" value={itemForm.minQty} onChange={e => setItemForm({ ...itemForm, minQty: parseInt(e.target.value) || 1 })} /></Field>
            <Field label="Unit"><Select value={itemForm.unit} onChange={e => setItemForm({ ...itemForm, unit: e.target.value })}><option value="pcs">Pieces</option><option value="set">Sets</option><option value="mtr">Meters</option><option value="kg">Kilograms</option><option value="ltr">Litres</option><option value="box">Boxes</option><option value="roll">Rolls</option><option value="pair">Pairs</option></Select></Field>
            <div />
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 20px" }}>
            <Field label="Purchase Price (₹)"><Input type="number" min="0" value={itemForm.purchasePrice} onChange={e => setItemForm({ ...itemForm, purchasePrice: parseFloat(e.target.value) || 0 })} style={{ fontFamily: MONO }} /></Field>
            <Field label="Selling Price (₹)"><Input type="number" min="0" value={itemForm.sellingPrice} onChange={e => setItemForm({ ...itemForm, sellingPrice: parseFloat(e.target.value) || 0 })} style={{ fontFamily: MONO }} /></Field>
          </div>

          <Field label="Description / Notes"><TextArea value={itemForm.description} onChange={e => setItemForm({ ...itemForm, description: e.target.value })} placeholder="Specifications, compatibility notes..." style={{ minHeight: 50 }} /></Field>

          <div style={{ display: "flex", gap: 12, justifyContent: "flex-end" }}>
            <Btn variant="secondary" onClick={() => { setShowAddItem(false); setEditItem(null); setItemForm(emptyItem); }}>Cancel</Btn>
            <Btn onClick={handleAddItem} disabled={!itemForm.name || !itemForm.storeId}>{editItem ? "Update Item" : "Add to Inventory"}</Btn>
          </div>
        </Modal>
      )}

      {/* ADD STORE MODAL */}
      {showAddStore && (
        <Modal title="Add Store / Location" onClose={() => setShowAddStore(false)}>
          <Field label="Store Name" required><Input value={storeForm.name} onChange={e => setStoreForm({ ...storeForm, name: e.target.value })} placeholder="e.g. Main Store, Warehouse B" /></Field>
          <Field label="Location / Address"><Input value={storeForm.location} onChange={e => setStoreForm({ ...storeForm, location: e.target.value })} placeholder="e.g. Ground Floor, Workshop Area" /></Field>
          <div style={{ padding: 12, background: C.surface2, borderRadius: 8, marginBottom: 16, fontSize: 12, color: C.textMuted, lineHeight: 1.6 }}>
            <span style={{ fontWeight: 600, color: C.textDim }}>Tip:</span> Create separate stores for different physical locations. Within each store, use Drawer/Shelf/Bin numbers on individual items to track exact placement.
          </div>
          <div style={{ display: "flex", gap: 12, justifyContent: "flex-end" }}>
            <Btn variant="secondary" onClick={() => setShowAddStore(false)}>Cancel</Btn>
            <Btn onClick={handleAddStore} disabled={!storeForm.name}>Add Store</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

//  DATA BACKUP PAGE (Admin Only)
// ═══════════════════════════════════════════════════════════════════════════
function BackupPage({ jobs, customers, users, deviceCategories, printerSettings, showToast, setJobs, setCustomers, setUsers, setDeviceCategories }) {
  const [backupHistory, setBackupHistory] = useState([]);
  const [restoreConfirm, setRestoreConfirm] = useState(false);
  const fileInputRef = useRef(null);

  const createBackup = (type = "full") => {
    const backupData = {
      version: "1.0", createdAt: new Date().toISOString(), type,
      data: type === "full" ? { jobs, customers, users: users.map(u => ({ ...u, password: "***" })), deviceCategories, printerSettings }
        : type === "jobs" ? { jobs } : type === "customers" ? { customers } : { jobs, customers, users: users.map(u => ({ ...u, password: "***" })), deviceCategories, printerSettings },
    };
    const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `CRM_Backup_${type}_${new Date().toISOString().split("T")[0]}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    const entry = { id: backupHistory.length + 1, date: new Date().toISOString(), type: type === "full" ? "Full Backup" : type === "jobs" ? "Jobs Only" : "Customers Only", size: (blob.size / 1024).toFixed(1) + " KB", status: "success" };
    setBackupHistory(prev => [entry, ...prev]);
    showToast(`${entry.type} downloaded successfully`);
  };

  const handleRestore = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.version || !data.data) throw new Error("Invalid backup format");
        if (data.data.jobs) setJobs(data.data.jobs);
        if (data.data.customers) setCustomers(data.data.customers);
        if (data.data.deviceCategories) setDeviceCategories(data.data.deviceCategories);
        showToast(`Data restored from ${data.type} backup (${new Date(data.createdAt).toLocaleDateString("en-IN")})`, "success");
        setRestoreConfirm(false);
      } catch (err) { showToast("Invalid backup file: " + err.message, "error"); }
    };
    reader.readAsText(file); e.target.value = "";
  };

  return (
    <div>
      <div style={{ marginBottom: 28 }}><h1 style={{ fontSize: 24, fontWeight: 800, margin: 0 }}>Data Backup & Restore</h1><p style={{ fontSize: 13, color: C.textMuted, marginTop: 4 }}>Export and import your CRM data securely</p></div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 16, marginBottom: 28 }}>
        <StatCard label="Total Jobs" value={jobs.length} color={C.accent} icon="📋" />
        <StatCard label="Customers" value={customers.length} color="#8b5cf6" icon="🏢" />
        <StatCard label="Users" value={users.length} color={C.warning} icon="👥" />
        <StatCard label="Categories" value={deviceCategories.length} color={C.success} icon="⚡" />
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24, marginBottom: 28 }}>
        <Card>
          <h3 style={{ fontSize: 15, fontWeight: 700, margin: "0 0 6px", color: C.accent }}>📤 Create Backup</h3>
          <p style={{ fontSize: 12, color: C.textMuted, marginBottom: 20 }}>Download a JSON backup file of your CRM data</p>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <Btn onClick={() => createBackup("full")} style={{ justifyContent: "center" }}><Icon d={Icons.download} size={16} color={C.bg} /> Full Backup (All Data)</Btn>
            <Btn variant="secondary" onClick={() => createBackup("jobs")} style={{ justifyContent: "center" }}><Icon d={Icons.download} size={16} /> Jobs Data Only</Btn>
            <Btn variant="secondary" onClick={() => createBackup("customers")} style={{ justifyContent: "center" }}><Icon d={Icons.download} size={16} /> Customers Data Only</Btn>
          </div>
        </Card>
        <Card>
          <h3 style={{ fontSize: 15, fontWeight: 700, margin: "0 0 6px", color: C.warning }}>📥 Restore Data</h3>
          <p style={{ fontSize: 12, color: C.textMuted, marginBottom: 20 }}>Import data from a previously exported backup file</p>
          <input type="file" accept=".json" ref={fileInputRef} onChange={handleRestore} style={{ display: "none" }} />
          {!restoreConfirm ? (
            <Btn variant="warning" onClick={() => setRestoreConfirm(true)} style={{ justifyContent: "center", width: "100%" }}><Icon d={Icons.backup} size={16} color={C.bg} /> Restore from Backup</Btn>
          ) : (
            <div style={{ padding: 16, background: C.warning + "12", border: `1px solid ${C.warning}44`, borderRadius: 8 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: C.warning, marginBottom: 8 }}>⚠️ Warning</div>
              <div style={{ fontSize: 12, color: C.textDim, marginBottom: 12 }}>Restoring will overwrite current data. This cannot be undone. Make sure you have a current backup before proceeding.</div>
              <div style={{ display: "flex", gap: 8 }}><Btn variant="warning" small onClick={() => fileInputRef.current?.click()}>Choose Backup File</Btn><Btn variant="ghost" small onClick={() => setRestoreConfirm(false)}>Cancel</Btn></div>
            </div>
          )}
        </Card>
      </div>
      <Card>
        <h3 style={{ fontSize: 15, fontWeight: 700, margin: "0 0 16px", color: C.text }}>Backup History</h3>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead><tr>{["Date & Time", "Type", "Size", "Status"].map(h => (<th key={h} style={{ textAlign: "left", padding: "8px 12px", fontSize: 11, fontWeight: 700, color: C.textMuted, borderBottom: `1px solid ${C.border}`, textTransform: "uppercase" }}>{h}</th>))}</tr></thead>
          <tbody>{backupHistory.map(b => (
            <tr key={b.id}><td style={{ padding: "10px 12px", fontSize: 13 }}>{new Date(b.date).toLocaleString("en-IN", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" })}</td><td style={{ padding: "10px 12px", fontSize: 13 }}>{b.type}</td><td style={{ padding: "10px 12px", fontSize: 13, fontFamily: MONO }}>{b.size}</td><td style={{ padding: "10px 12px" }}><Badge label="Success" color={C.success} /></td></tr>
          ))}</tbody>
        </table>
      </Card>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  USERS PAGE
// ═══════════════════════════════════════════════════════════════════════════
function UsersPage({ users, setUsers, currentUser, showToast }) {
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({ name: "", email: "", password: "", role: ROLES.TECHNICIAN });
  const [changePwUser, setChangePwUser] = useState(null);
  const [newPassword, setNewPassword] = useState("");
  const [confirmPassword, setConfirmPassword] = useState("");
  const [pwError, setPwError] = useState("");
  const [removeUser, setRemoveUser] = useState(null);
  const [removeConfirmText, setRemoveConfirmText] = useState("");

  const handleAdd = () => {
    if (!form.name || !form.email || !form.password) return;
    if (users.find(u => u.email === form.email)) { showToast("Email already exists", "error"); return; }
    setUsers(prev => [...prev, { ...form, id: "u" + Date.now() }]);
    setShowAdd(false);
    setForm({ name: "", email: "", password: "", role: ROLES.TECHNICIAN });
    showToast("User added successfully");
  };

  const handleChangePassword = () => {
    setPwError("");
    if (!newPassword || newPassword.length < 4) { setPwError("Password must be at least 4 characters"); return; }
    if (newPassword !== confirmPassword) { setPwError("Passwords do not match"); return; }
    setUsers(prev => prev.map(u => u.id === changePwUser.id ? { ...u, password: newPassword } : u));
    setChangePwUser(null);
    setNewPassword("");
    setConfirmPassword("");
    showToast(`Password changed for ${changePwUser.name}`);
  };

  const handleRemoveUser = () => {
    if (removeConfirmText !== "DELETE") return;
    setUsers(prev => prev.filter(u => u.id !== removeUser.id));
    setRemoveUser(null);
    setRemoveConfirmText("");
    showToast(`${removeUser.name} removed`, "warning");
  };

  const getRoleColor = (role) => role === ROLES.ADMIN ? C.danger : role === ROLES.MANAGER ? C.warning : role === ROLES.FRONT_DESK ? "#8b5cf6" : C.accent;

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
        <div><h1 style={{ fontSize: 24, fontWeight: 800, margin: 0 }}>User Management</h1><p style={{ fontSize: 13, color: C.textMuted, margin: "4px 0 0" }}>{users.length} user{users.length !== 1 ? "s" : ""} registered</p></div>
        <Btn onClick={() => setShowAdd(true)}><Icon d={Icons.plus} size={16} color={C.bg} /> Add User</Btn>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(340px, 1fr))", gap: 16 }}>
        {users.map(u => {
          const isSelf = u.id === currentUser.id;
          const roleColor = getRoleColor(u.role);
          return (
            <Card key={u.id} style={{ position: "relative", borderLeft: `3px solid ${roleColor}` }}>
              <div style={{ display: "flex", gap: 14, alignItems: "center", marginBottom: 14 }}>
                <div style={{ width: 48, height: 48, borderRadius: 24, background: roleColor + "22", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, fontWeight: 700, color: roleColor }}>{u.name[0]}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontWeight: 700, fontSize: 15 }}>{u.name}</span>
                    {isSelf && <span style={{ fontSize: 10, fontWeight: 700, color: C.accent, background: C.accentDim, padding: "2px 6px", borderRadius: 4 }}>YOU</span>}
                  </div>
                  <div style={{ fontSize: 12, color: C.textMuted, fontFamily: MONO, marginTop: 2 }}>{u.email}</div>
                </div>
                <Badge label={ROLE_LABELS[u.role]} color={roleColor} />
              </div>

              <div style={{ display: "flex", gap: 8, borderTop: `1px solid ${C.border}`, paddingTop: 12 }}>
                <Btn variant="secondary" small onClick={() => { setChangePwUser(u); setNewPassword(""); setConfirmPassword(""); setPwError(""); }}>
                  🔑 Change Password
                </Btn>
                {!isSelf && (
                  <Btn variant="danger" small onClick={() => { setRemoveUser(u); setRemoveConfirmText(""); }}>
                    🗑️ Remove
                  </Btn>
                )}
                {isSelf && (
                  <span style={{ fontSize: 11, color: C.textMuted, display: "flex", alignItems: "center", marginLeft: 4 }}>Cannot remove yourself</span>
                )}
              </div>
            </Card>
          );
        })}
      </div>

      {/* Add User Modal */}
      {showAdd && <Modal title="Add New User" onClose={() => setShowAdd(false)}>
        <Field label="Full Name" required><Input value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="Enter full name" /></Field>
        <Field label="Email" required><Input type="email" value={form.email} onChange={e => setForm({ ...form, email: e.target.value })} placeholder="user@email.com" /></Field>
        <Field label="Password" required><Input type="password" value={form.password} onChange={e => setForm({ ...form, password: e.target.value })} placeholder="Set password (min 4 chars)" /></Field>
        <Field label="Role"><Select value={form.role} onChange={e => setForm({ ...form, role: e.target.value })}>{Object.entries(ROLE_LABELS).map(([k, v]) => <option key={k} value={k}>{v}</option>)}</Select></Field>
        <div style={{ padding: 12, background: C.surface2, borderRadius: 8, marginBottom: 16, fontSize: 12, color: C.textDim, lineHeight: 1.5 }}>
          <strong style={{ color: C.text }}>Role Permissions:</strong><br />
          <span style={{ color: C.danger }}>Admin</span> — Full system control & all modules<br />
          <span style={{ color: C.warning }}>Manager</span> — Full access, monitor all operations<br />
          <span style={{ color: "#8b5cf6" }}>Front Desk</span> — Create jobs, customers, print, no tech access<br />
          <span style={{ color: C.accent }}>Technician</span> — View assigned jobs, update inspection & status
        </div>
        <div style={{ display: "flex", gap: 12, justifyContent: "flex-end" }}><Btn variant="secondary" onClick={() => setShowAdd(false)}>Cancel</Btn><Btn onClick={handleAdd} disabled={!form.name || !form.email || !form.password}>Add User</Btn></div>
      </Modal>}

      {/* Change Password Modal */}
      {changePwUser && <Modal title={`Change Password — ${changePwUser.name}`} onClose={() => setChangePwUser(null)}>
        <div style={{ display: "flex", gap: 12, alignItems: "center", padding: "12px 16px", background: C.surface2, borderRadius: 8, marginBottom: 20 }}>
          <div style={{ width: 40, height: 40, borderRadius: 20, background: getRoleColor(changePwUser.role) + "22", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, fontWeight: 700, color: getRoleColor(changePwUser.role) }}>{changePwUser.name[0]}</div>
          <div><div style={{ fontWeight: 600, fontSize: 14 }}>{changePwUser.name}</div><div style={{ fontSize: 12, color: C.textMuted, fontFamily: MONO }}>{changePwUser.email}</div></div>
          <Badge label={ROLE_LABELS[changePwUser.role]} color={getRoleColor(changePwUser.role)} />
        </div>
        <Field label="New Password" required><Input type="password" value={newPassword} onChange={e => { setNewPassword(e.target.value); setPwError(""); }} placeholder="Enter new password (min 4 chars)" /></Field>
        <Field label="Confirm New Password" required><Input type="password" value={confirmPassword} onChange={e => { setConfirmPassword(e.target.value); setPwError(""); }} placeholder="Re-enter new password" onKeyDown={e => e.key === "Enter" && handleChangePassword()} /></Field>
        {newPassword && confirmPassword && newPassword === confirmPassword && <div style={{ display: "flex", alignItems: "center", gap: 6, color: C.success, fontSize: 12, marginBottom: 12 }}><Icon d={Icons.check} size={14} color={C.success} /> Passwords match</div>}
        {newPassword && confirmPassword && newPassword !== confirmPassword && <div style={{ color: C.danger, fontSize: 12, marginBottom: 12 }}>⚠️ Passwords do not match</div>}
        {pwError && <div style={{ color: C.danger, fontSize: 13, marginBottom: 12, padding: "8px 12px", background: C.danger + "12", borderRadius: 6 }}>{pwError}</div>}
        <div style={{ display: "flex", gap: 12, justifyContent: "flex-end" }}><Btn variant="secondary" onClick={() => setChangePwUser(null)}>Cancel</Btn><Btn onClick={handleChangePassword} disabled={!newPassword || !confirmPassword}>🔑 Update Password</Btn></div>
      </Modal>}

      {/* Remove User Confirmation Modal */}
      {removeUser && <Modal title="Remove User Account" onClose={() => setRemoveUser(null)}>
        <div style={{ padding: 16, background: C.danger + "12", border: `1px solid ${C.danger}33`, borderRadius: 10, marginBottom: 20 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
            <span style={{ fontSize: 24 }}>⚠️</span>
            <span style={{ fontSize: 15, fontWeight: 700, color: C.danger }}>This action cannot be undone</span>
          </div>
          <div style={{ fontSize: 13, color: C.textDim, lineHeight: 1.6 }}>
            You are about to permanently remove the following user account. Any jobs assigned to this user will remain but will show as unassigned.
          </div>
        </div>

        <div style={{ display: "flex", gap: 12, alignItems: "center", padding: "14px 16px", background: C.surface2, borderRadius: 8, marginBottom: 20 }}>
          <div style={{ width: 44, height: 44, borderRadius: 22, background: getRoleColor(removeUser.role) + "22", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, fontWeight: 700, color: getRoleColor(removeUser.role) }}>{removeUser.name[0]}</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontWeight: 700, fontSize: 15 }}>{removeUser.name}</div>
            <div style={{ fontSize: 12, color: C.textMuted, fontFamily: MONO }}>{removeUser.email}</div>
          </div>
          <Badge label={ROLE_LABELS[removeUser.role]} color={getRoleColor(removeUser.role)} />
        </div>

        <Field label={<span>Type <span style={{ color: C.danger, fontFamily: MONO, fontWeight: 800 }}>DELETE</span> to confirm</span>} required>
          <Input value={removeConfirmText} onChange={e => setRemoveConfirmText(e.target.value.toUpperCase())} placeholder="Type DELETE here..." style={{ fontFamily: MONO, letterSpacing: 2, textAlign: "center", fontSize: 16, fontWeight: 700, color: removeConfirmText === "DELETE" ? C.danger : C.text }} />
        </Field>

        <div style={{ display: "flex", gap: 12, justifyContent: "flex-end" }}>
          <Btn variant="secondary" onClick={() => setRemoveUser(null)}>Cancel</Btn>
          <Btn variant="danger" onClick={handleRemoveUser} disabled={removeConfirmText !== "DELETE"}>🗑️ Remove User Permanently</Btn>
        </div>
      </Modal>}
    </div>
  );
}
