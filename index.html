//  ACCOUNTS PAGE (Invoice & Delivery Challan)
// ═══════════════════════════════════════════════════════════════════════════
function AccountsPage({ invoices, setInvoices, challans, setChallans, jobs, customers, getCustomer, getDevice, companyDetails, showToast }) {
  const [tab, setTab] = useState("invoices");
  const [showCreate, setShowCreate] = useState(null); // "invoice" | "challan"
  const [viewDoc, setViewDoc] = useState(null);

  const completedJobs = jobs.filter(j => ["Completed", "Delivered"].includes(j.status));
  const totalRevenue = invoices.reduce((s, inv) => { const sub = inv.items.reduce((a, i) => a + i.qty * i.rate, 0); return s + sub + sub * inv.gstPercent / 100; }, 0);
  const paidRevenue = invoices.filter(i => i.status === "paid").reduce((s, inv) => { const sub = inv.items.reduce((a, i) => a + i.qty * i.rate, 0); return s + sub + sub * inv.gstPercent / 100; }, 0);

  const nextInvId = "INV-2026-" + String(invoices.length + 1).padStart(4, "0");
  const nextDcId = "DC-2026-" + String(challans.length + 1).padStart(4, "0");

  const printInvoice = (inv) => {
    const cust = getCustomer(inv.customerId);
    const subtotal = inv.items.reduce((a, i) => a + i.qty * i.rate, 0);
    const gstAmt = subtotal * inv.gstPercent / 100;
    const total = subtotal + gstAmt;
    const html = `
      <div class="header"><div>${companyDetails.logo ? `<img src="${companyDetails.logo}" style="height:50px;margin-bottom:4px;display:block"/>` : ""}<h1>${companyDetails.name}</h1><div class="meta">${companyDetails.address}</div><div class="meta">📞 ${companyDetails.phone} | ✉ ${companyDetails.email}</div><div class="meta" style="font-weight:600">GSTIN: ${companyDetails.gstNo}</div></div><div style="text-align:right"><div style="font-size:22px;font-weight:800;color:#333">TAX INVOICE</div><div style="font-size:16px;font-weight:700;font-family:monospace;margin:4px 0">${inv.id}</div><div class="meta">Date: ${new Date(inv.date).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"})}</div><div class="meta">Due: ${new Date(inv.dueDate).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"})}</div><div class="badge" style="background:${inv.status==="paid"?"#10b98122":"#ef444422"};color:${inv.status==="paid"?"#059669":"#dc2626"};margin-top:6px">${inv.status==="paid"?"PAID":"UNPAID"}</div></div></div>
      <h2>Bill To</h2><table><tr><th>Company</th><td>${cust?.name||"—"}</td><th>GST No.</th><td style="font-family:monospace">${cust?.gstNo||"N/A"}</td></tr><tr><th>Contact</th><td>${cust?.contactPerson||"—"}</td><th>Phone</th><td>${cust?.phone||"—"}</td></tr><tr><th colspan="1">Address</th><td colspan="3">${cust?.address||"—"}</td></tr></table>
      <h2>Items</h2><table><tr><th>#</th><th>Description</th><th style="text-align:right">Qty</th><th style="text-align:right">Rate (₹)</th><th style="text-align:right">Amount (₹)</th></tr>${inv.items.map((item,i)=>`<tr><td>${i+1}</td><td>${item.desc}</td><td style="text-align:right">${item.qty}</td><td style="text-align:right;font-family:monospace">${item.rate.toLocaleString("en-IN")}</td><td style="text-align:right;font-family:monospace">${(item.qty*item.rate).toLocaleString("en-IN")}</td></tr>`).join("")}
      <tr style="border-top:2px solid #333"><th colspan="4" style="text-align:right">Subtotal</th><td style="text-align:right;font-family:monospace;font-weight:700">₹${subtotal.toLocaleString("en-IN")}</td></tr><tr><th colspan="4" style="text-align:right">GST @ ${inv.gstPercent}%</th><td style="text-align:right;font-family:monospace">₹${gstAmt.toLocaleString("en-IN")}</td></tr><tr style="background:#f0f0f0"><th colspan="4" style="text-align:right;font-size:15px">Grand Total</th><td style="text-align:right;font-family:monospace;font-size:15px;font-weight:800">₹${total.toLocaleString("en-IN")}</td></tr></table>
      ${inv.notes?`<p style="margin-top:10px;font-size:12px;color:#666">Note: ${inv.notes}</p>`:""}
      ${companyDetails.bankName?`<h2>Bank Details</h2><table><tr><th>Bank</th><td>${companyDetails.bankName}</td><th>Account No.</th><td style="font-family:monospace">${companyDetails.bankAccount}</td></tr><tr><th>IFSC</th><td style="font-family:monospace">${companyDetails.bankIfsc}</td><th></th><td></td></tr></table>`:""}
      <div style="margin-top:40px;display:flex;justify-content:space-between"><div style="font-size:11px;color:#999">This is a computer generated invoice</div><div><div style="border-top:1px solid #999;width:200px;margin-top:40px;padding-top:4px;font-size:12px">Authorized Signatory</div></div></div>`;
    printContent(html, `Invoice - ${inv.id}`);
  };

  const printChallan = (dc) => {
    const cust = getCustomer(dc.customerId);
    const html = `
      <div class="header"><div>${companyDetails.logo ? `<img src="${companyDetails.logo}" style="height:50px;margin-bottom:4px;display:block"/>` : ""}<h1>${companyDetails.name}</h1><div class="meta">${companyDetails.address}</div><div class="meta">GSTIN: ${companyDetails.gstNo}</div></div><div style="text-align:right"><div style="font-size:22px;font-weight:800;color:#333">DELIVERY CHALLAN</div><div style="font-size:16px;font-weight:700;font-family:monospace;margin:4px 0">${dc.id}</div><div class="meta">Date: ${new Date(dc.date).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"})}</div></div></div>
      <h2>Deliver To</h2><table><tr><th>Company</th><td>${cust?.name||"—"}</td><th>GST No.</th><td style="font-family:monospace">${cust?.gstNo||"N/A"}</td></tr><tr><th>Contact</th><td>${cust?.contactPerson||"—"}</td><th>Phone</th><td>${cust?.phone||"—"}</td></tr><tr><th>Address</th><td colspan="3">${cust?.address||"—"}</td></tr></table>
      <h2>Items</h2><table><tr><th>#</th><th>Description</th><th style="text-align:right">Qty</th></tr>${dc.items.map((item,i)=>`<tr><td>${i+1}</td><td>${item.desc}</td><td style="text-align:right">${item.qty}</td></tr>`).join("")}</table>
      <h2>Transport Details</h2><table><tr><th>Vehicle No.</th><td>${dc.vehicleNo||"—"}</td><th>Transport Mode</th><td>${dc.transportMode||"—"}</td></tr></table>
      ${dc.notes?`<p style="margin-top:10px;font-size:12px;color:#666">Note: ${dc.notes}</p>`:""}
      <div style="margin-top:40px;display:flex;justify-content:space-between"><div><div style="border-top:1px solid #999;width:180px;margin-top:40px;padding-top:4px;font-size:12px">Received By (Sign & Stamp)</div></div><div><div style="border-top:1px solid #999;width:180px;margin-top:40px;padding-top:4px;font-size:12px">Authorized Signatory</div></div></div>`;
    printContent(html, `Delivery Challan - ${dc.id}`);
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24, flexWrap: "wrap", gap: 12 }}>
        <div><h1 style={{ fontSize: 24, fontWeight: 800, margin: 0 }}>Accounts</h1><p style={{ fontSize: 13, color: C.textMuted, margin: "4px 0 0" }}>Invoices & Delivery Challans</p></div>
        <div style={{ display: "flex", gap: 10 }}>
          <Btn onClick={() => setShowCreate("invoice")}><Icon d={Icons.plus} size={16} color={C.bg} /> New Invoice</Btn>
          <Btn variant="secondary" onClick={() => setShowCreate("challan")}><Icon d={Icons.plus} size={16} /> New Challan</Btn>
        </div>
      </div>

      <div style={{ display: "flex", flexWrap: "wrap", gap: 16, marginBottom: 28 }}>
        <StatCard label="Invoices" value={invoices.length} color={C.accent} icon="📄" />
        <StatCard label="Total Revenue" value={`₹${(totalRevenue/1000).toFixed(1)}k`} color={C.success} icon="💰" />
        <StatCard label="Paid" value={`₹${(paidRevenue/1000).toFixed(1)}k`} color="#10b981" icon="✅" />
        <StatCard label="Unpaid" value={`₹${((totalRevenue-paidRevenue)/1000).toFixed(1)}k`} color={C.danger} icon="⏳" />
        <StatCard label="Challans" value={challans.length} color={C.warning} icon="🚚" />
      </div>

      <div style={{ display: "flex", gap: 0, marginBottom: 20, borderRadius: 10, overflow: "hidden", border: `1px solid ${C.border}`, maxWidth: 400 }}>
        {[{id:"invoices",label:"📄 Invoices"},{id:"challans",label:"🚚 Delivery Challans"}].map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: 1, padding: "10px 16px", border: "none", cursor: "pointer", fontFamily: FONT, fontSize: 13, fontWeight: 600, background: tab === t.id ? C.accent : C.surface2, color: tab === t.id ? C.bg : C.textMuted, transition: "all 0.2s" }}>{t.label}</button>
        ))}
      </div>

      {tab === "invoices" && (
        <div style={{ display: "grid", gap: 12 }}>
          {invoices.length === 0 ? <EmptyState icon="📄" message="No invoices yet" /> : invoices.map(inv => {
            const cust = getCustomer(inv.customerId); const subtotal = inv.items.reduce((a, i) => a + i.qty * i.rate, 0); const total = subtotal + subtotal * inv.gstPercent / 100;
            return (
              <Card key={inv.id}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12 }}>
                  <div>
                    <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 6 }}>
                      <span style={{ fontFamily: MONO, fontSize: 15, fontWeight: 700, color: C.accent }}>{inv.id}</span>
                      <Badge label={inv.status === "paid" ? "Paid" : "Unpaid"} color={inv.status === "paid" ? C.success : C.danger} />
                      {inv.jobId && <span style={{ fontSize: 11, color: C.textMuted, fontFamily: MONO }}>→ {inv.jobId}</span>}
                    </div>
                    <div style={{ fontSize: 14, fontWeight: 600 }}>{cust?.name}</div>
                    <div style={{ fontSize: 12, color: C.textMuted, marginTop: 2 }}>{inv.items.length} item{inv.items.length > 1 ? "s" : ""} · {new Date(inv.date).toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" })}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 20, fontWeight: 800, color: C.success, fontFamily: MONO }}>₹{total.toLocaleString("en-IN")}</div>
                    <div style={{ fontSize: 11, color: C.textMuted }}>incl. GST {inv.gstPercent}%</div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 8, marginTop: 12, borderTop: `1px solid ${C.border}`, paddingTop: 12 }}>
                  <Btn variant="ghost" small onClick={() => printInvoice(inv)}>🖨️ Print</Btn>
                  {inv.status === "unpaid" && <Btn variant="success" small onClick={() => { setInvoices(prev => prev.map(i => i.id === inv.id ? { ...i, status: "paid" } : i)); showToast(`${inv.id} marked as paid`); }}>✅ Mark Paid</Btn>}
                  {inv.status === "paid" && <Btn variant="ghost" small onClick={() => { setInvoices(prev => prev.map(i => i.id === inv.id ? { ...i, status: "unpaid" } : i)); showToast(`${inv.id} marked as unpaid`, "warning"); }}>↩️ Mark Unpaid</Btn>}
                </div>
              </Card>
            );
          })}
        </div>
      )}

      {tab === "challans" && (
        <div style={{ display: "grid", gap: 12 }}>
          {challans.length === 0 ? <EmptyState icon="🚚" message="No delivery challans yet" /> : challans.map(dc => {
            const cust = getCustomer(dc.customerId);
            return (
              <Card key={dc.id}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12 }}>
                  <div>
                    <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 6 }}>
                      <span style={{ fontFamily: MONO, fontSize: 15, fontWeight: 700, color: C.warning }}>{dc.id}</span>
                      {dc.jobId && <span style={{ fontSize: 11, color: C.textMuted, fontFamily: MONO }}>→ {dc.jobId}</span>}
                    </div>
                    <div style={{ fontSize: 14, fontWeight: 600 }}>{cust?.name}</div>
                    <div style={{ fontSize: 12, color: C.textMuted, marginTop: 2 }}>{dc.items.length} item{dc.items.length > 1 ? "s" : ""} · {new Date(dc.date).toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" })}</div>
                  </div>
                  <div style={{ textAlign: "right", fontSize: 12, color: C.textDim }}>
                    {dc.vehicleNo && <div>🚛 {dc.vehicleNo}</div>}
                    <div>{dc.transportMode}</div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 8, marginTop: 12, borderTop: `1px solid ${C.border}`, paddingTop: 12 }}>
                  <Btn variant="ghost" small onClick={() => printChallan(dc)}>🖨️ Print</Btn>
                </div>
              </Card>
            );
          })}
        </div>
      )}

      {/* CREATE INVOICE MODAL */}
      {showCreate === "invoice" && <CreateInvoiceModal id={nextInvId} jobs={completedJobs} customers={customers} getCustomer={getCustomer} onClose={() => setShowCreate(null)} onSubmit={(inv) => { setInvoices(prev => [...prev, inv]); setShowCreate(null); showToast(`Invoice ${inv.id} created`); }} />}
      {showCreate === "challan" && <CreateChallanModal id={nextDcId} jobs={completedJobs} customers={customers} getCustomer={getCustomer} onClose={() => setShowCreate(null)} onSubmit={(dc) => { setChallans(prev => [...prev, dc]); setShowCreate(null); showToast(`Challan ${dc.id} created`); }} />}
    </div>
  );
}

// ── Create Invoice Modal ──
function CreateInvoiceModal({ id, jobs, customers, getCustomer, onClose, onSubmit }) {
  const [form, setForm] = useState({ id, jobId: "", customerId: "", date: new Date().toISOString().split("T")[0], dueDate: "", items: [{ desc: "", qty: 1, rate: 0 }], gstPercent: 18, status: "unpaid", notes: "" });

  const addItem = () => setForm(prev => ({ ...prev, items: [...prev.items, { desc: "", qty: 1, rate: 0 }] }));
  const removeItem = (idx) => setForm(prev => ({ ...prev, items: prev.items.filter((_, i) => i !== idx) }));
  const updateItem = (idx, field, val) => setForm(prev => ({ ...prev, items: prev.items.map((item, i) => i === idx ? { ...item, [field]: val } : item) }));
  const subtotal = form.items.reduce((a, i) => a + i.qty * i.rate, 0);
  const gstAmt = subtotal * form.gstPercent / 100;
  const valid = form.customerId && form.date && form.items.length > 0 && form.items.every(i => i.desc);

  const handleJobSelect = (jobId) => {
    const job = jobs.find(j => j.id === jobId);
    if (job) setForm(prev => ({ ...prev, jobId, customerId: job.customerId, items: job.estimate ? [{ desc: `Service & Repair — ${job.deviceBrand} ${job.deviceModel}`, qty: 1, rate: job.estimate }] : prev.items }));
  };

  return (
    <Modal title={`Create Invoice — ${id}`} onClose={onClose} wide>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 20px" }}>
        <Field label="Link to Job (optional)"><Select value={form.jobId} onChange={e => handleJobSelect(e.target.value)}><option value="">Select Job</option>{jobs.map(j => <option key={j.id} value={j.id}>{j.id} — {getCustomer(j.customerId)?.name}</option>)}</Select></Field>
        <Field label="Customer" required><Select value={form.customerId} onChange={e => setForm({ ...form, customerId: e.target.value })}><option value="">Select Customer</option>{customers.map(c => <option key={c.id} value={c.id}>{c.name} {c.gstNo ? `(${c.gstNo})` : ""}</option>)}</Select></Field>
        <Field label="Invoice Date" required><Input type="date" value={form.date} onChange={e => setForm({ ...form, date: e.target.value })} /></Field>
        <Field label="Due Date"><Input type="date" value={form.dueDate} onChange={e => setForm({ ...form, dueDate: e.target.value })} /></Field>
      </div>

      <div style={{ marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <label style={{ fontSize: 12, fontWeight: 600, color: C.textDim, textTransform: "uppercase", letterSpacing: 0.8 }}>Line Items</label>
          <Btn variant="ghost" small onClick={addItem}><Icon d={Icons.plus} size={14} /> Add Item</Btn>
        </div>
        {form.items.map((item, idx) => (
          <div key={idx} style={{ display: "flex", gap: 8, marginBottom: 8, alignItems: "center" }}>
            <Input value={item.desc} onChange={e => updateItem(idx, "desc", e.target.value)} placeholder="Description" style={{ flex: 3 }} />
            <Input type="number" value={item.qty} onChange={e => updateItem(idx, "qty", parseInt(e.target.value) || 0)} placeholder="Qty" style={{ flex: 0.5, textAlign: "center" }} />
            <Input type="number" value={item.rate} onChange={e => updateItem(idx, "rate", parseFloat(e.target.value) || 0)} placeholder="Rate ₹" style={{ flex: 1, fontFamily: MONO }} />
            <div style={{ flex: 1, textAlign: "right", fontFamily: MONO, fontSize: 13, fontWeight: 600, color: C.text }}>₹{(item.qty * item.rate).toLocaleString("en-IN")}</div>
            {form.items.length > 1 && <button onClick={() => removeItem(idx)} style={{ background: "none", border: "none", cursor: "pointer", color: C.danger, fontSize: 16 }}>×</button>}
          </div>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 20px" }}>
        <Field label="GST %"><Input type="number" value={form.gstPercent} onChange={e => setForm({ ...form, gstPercent: parseFloat(e.target.value) || 0 })} /></Field>
        <div style={{ padding: "16px 0" }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: C.textDim, marginBottom: 4 }}><span>Subtotal</span><span style={{ fontFamily: MONO }}>₹{subtotal.toLocaleString("en-IN")}</span></div>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: C.textDim, marginBottom: 4 }}><span>GST {form.gstPercent}%</span><span style={{ fontFamily: MONO }}>₹{gstAmt.toLocaleString("en-IN")}</span></div>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 16, fontWeight: 800, color: C.success, borderTop: `1px solid ${C.border}`, paddingTop: 6 }}><span>Total</span><span style={{ fontFamily: MONO }}>₹{(subtotal + gstAmt).toLocaleString("en-IN")}</span></div>
        </div>
      </div>
      <Field label="Notes"><TextArea value={form.notes} onChange={e => setForm({ ...form, notes: e.target.value })} placeholder="Payment terms, remarks..." style={{ minHeight: 50 }} /></Field>
      <div style={{ display: "flex", gap: 12, justifyContent: "flex-end" }}><Btn variant="secondary" onClick={onClose}>Cancel</Btn><Btn onClick={() => onSubmit(form)} disabled={!valid}>Create Invoice</Btn></div>
    </Modal>
  );
}

// ── Create Challan Modal ──
function CreateChallanModal({ id, jobs, customers, getCustomer, onClose, onSubmit }) {
  const [form, setForm] = useState({ id, jobId: "", customerId: "", date: new Date().toISOString().split("T")[0], items: [{ desc: "", qty: 1 }], vehicleNo: "", transportMode: "Company Vehicle", notes: "" });

  const addItem = () => setForm(prev => ({ ...prev, items: [...prev.items, { desc: "", qty: 1 }] }));
  const removeItem = (idx) => setForm(prev => ({ ...prev, items: prev.items.filter((_, i) => i !== idx) }));
  const updateItem = (idx, field, val) => setForm(prev => ({ ...prev, items: prev.items.map((item, i) => i === idx ? { ...item, [field]: val } : item) }));
  const valid = form.customerId && form.date && form.items.length > 0 && form.items.every(i => i.desc);

  const handleJobSelect = (jobId) => {
    const job = jobs.find(j => j.id === jobId);
    if (job) setForm(prev => ({ ...prev, jobId, customerId: job.customerId, items: [{ desc: `${job.deviceBrand} ${job.deviceModel} (Repaired/Serviced)`, qty: 1 }, ...(job.accessories || []).map(a => ({ desc: a, qty: 1 }))] }));
  };

  return (
    <Modal title={`Create Delivery Challan — ${id}`} onClose={onClose} wide>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 20px" }}>
        <Field label="Link to Job (optional)"><Select value={form.jobId} onChange={e => handleJobSelect(e.target.value)}><option value="">Select Job</option>{jobs.map(j => <option key={j.id} value={j.id}>{j.id} — {getCustomer(j.customerId)?.name}</option>)}</Select></Field>
        <Field label="Customer" required><Select value={form.customerId} onChange={e => setForm({ ...form, customerId: e.target.value })}><option value="">Select Customer</option>{customers.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}</Select></Field>
        <Field label="Challan Date" required><Input type="date" value={form.date} onChange={e => setForm({ ...form, date: e.target.value })} /></Field>
        <Field label="Vehicle Number"><Input value={form.vehicleNo} onChange={e => setForm({ ...form, vehicleNo: e.target.value.toUpperCase() })} placeholder="e.g. AS-01-AB-1234" style={{ fontFamily: MONO }} /></Field>
      </div>
      <Field label="Transport Mode"><Select value={form.transportMode} onChange={e => setForm({ ...form, transportMode: e.target.value })}><option>Company Vehicle</option><option>Courier</option><option>Customer Pickup</option><option>Third Party Transport</option><option>Hand Delivery</option></Select></Field>

      <div style={{ marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <label style={{ fontSize: 12, fontWeight: 600, color: C.textDim, textTransform: "uppercase", letterSpacing: 0.8 }}>Items to Deliver</label>
          <Btn variant="ghost" small onClick={addItem}><Icon d={Icons.plus} size={14} /> Add Item</Btn>
        </div>
        {form.items.map((item, idx) => (
          <div key={idx} style={{ display: "flex", gap: 8, marginBottom: 8, alignItems: "center" }}>
            <Input value={item.desc} onChange={e => updateItem(idx, "desc", e.target.value)} placeholder="Item description" style={{ flex: 4 }} />
            <Input type="number" value={item.qty} onChange={e => updateItem(idx, "qty", parseInt(e.target.value) || 0)} placeholder="Qty" style={{ flex: 0.6, textAlign: "center" }} />
            {form.items.length > 1 && <button onClick={() => removeItem(idx)} style={{ background: "none", border: "none", cursor: "pointer", color: C.danger, fontSize: 16 }}>×</button>}
          </div>
        ))}
      </div>
      <Field label="Notes"><TextArea value={form.notes} onChange={e => setForm({ ...form, notes: e.target.value })} placeholder="Delivery instructions, remarks..." style={{ minHeight: 50 }} /></Field>
      <div style={{ display: "flex", gap: 12, justifyContent: "flex-end" }}><Btn variant="secondary" onClick={onClose}>Cancel</Btn><Btn onClick={() => onSubmit(form)} disabled={!valid}>Create Delivery Challan</Btn></div>
    </Modal>
  );
}

  const themes = [
    { id: "cyan", label: "Cyan Ice", accent: "#22d3ee", bg: "#0a0e17" },
    { id: "emerald", label: "Emerald", accent: "#10b981", bg: "#0a1210" },
    { id: "amber", label: "Amber Gold", accent: "#f59e0b", bg: "#0f0d08" },
    { id: "violet", label: "Violet", accent: "#8b5cf6", bg: "#0c0a14" },
    { id: "rose", label: "Rose", accent: "#f43f5e", bg: "#110a0c" },
    { id: "blue", label: "Classic Blue", accent: "#3b82f6", bg: "#080c14" },
  ];
  const tabs = [
    { id: "company", label: "🏢 Company Details" },
    { id: "printer", label: "🖨️ Printer Config" },
    { id: "theme", label: "🎨 Theme" },
  ];
  const handleLogoUpload = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { setCompanyDetails(prev => ({ ...prev, logo: ev.target.result })); showToast("Logo uploaded"); };
    reader.readAsDataURL(file); e.target.value = "";
  };
  return (
    <div>
      <h1 style={{ fontSize: 24, fontWeight: 800, margin: "0 0 24px" }}>Settings</h1>
      <div style={{ display: "flex", gap: 0, marginBottom: 28, borderRadius: 10, overflow: "hidden", border: `1px solid ${C.border}` }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: 1, padding: "12px 16px", border: "none", cursor: "pointer", fontFamily: FONT, fontSize: 13, fontWeight: 600, background: tab === t.id ? C.accent : C.surface2, color: tab === t.id ? C.bg : C.textMuted, transition: "all 0.2s" }}>{t.label}</button>
        ))}
      </div>

      {tab === "company" && (
        <div style={{ display: "grid", gap: 24, maxWidth: 700 }}>
          <Card>
            <h3 style={{ fontSize: 15, fontWeight: 700, margin: "0 0 20px", color: C.accent }}>🏢 Company Information</h3>
            <div style={{ display: "flex", gap: 20, marginBottom: 20, alignItems: "center" }}>
              <div style={{ width: 80, height: 80, borderRadius: 12, border: `2px dashed ${C.border}`, display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden", background: C.surface2, flexShrink: 0 }}>
                {companyDetails.logo ? <img src={companyDetails.logo} alt="Logo" style={{ width: "100%", height: "100%", objectFit: "contain" }} /> : <span style={{ fontSize: 28, opacity: 0.3 }}>🏭</span>}
              </div>
              <div>
                <div style={{ fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 6 }}>Company Logo</div>
                <div style={{ display: "flex", gap: 8 }}>
                  <label style={{ padding: "6px 14px", borderRadius: 6, background: C.accentDim, color: C.accent, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: FONT }}>
                    Upload Logo <input type="file" accept="image/*" onChange={handleLogoUpload} style={{ display: "none" }} />
                  </label>
                  {companyDetails.logo && <Btn variant="ghost" small onClick={() => { setCompanyDetails(prev => ({ ...prev, logo: "" })); showToast("Logo removed", "warning"); }}>Remove</Btn>}
                </div>
                <div style={{ fontSize: 11, color: C.textMuted, marginTop: 4 }}>PNG, JPG — used on invoices & challans</div>
              </div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 20px" }}>
              <Field label="Company Name" required><Input value={companyDetails.name} onChange={e => setCompanyDetails(prev => ({ ...prev, name: e.target.value }))} /></Field>
              <Field label="GST Number" required><Input value={companyDetails.gstNo} onChange={e => setCompanyDetails(prev => ({ ...prev, gstNo: e.target.value.toUpperCase() }))} style={{ fontFamily: MONO, letterSpacing: 1 }} /></Field>
              <Field label="Phone"><Input value={companyDetails.phone} onChange={e => setCompanyDetails(prev => ({ ...prev, phone: e.target.value }))} /></Field>
              <Field label="Email"><Input value={companyDetails.email} onChange={e => setCompanyDetails(prev => ({ ...prev, email: e.target.value }))} /></Field>
              <Field label="Website"><Input value={companyDetails.website} onChange={e => setCompanyDetails(prev => ({ ...prev, website: e.target.value }))} /></Field>
            </div>
            <Field label="Address"><TextArea value={companyDetails.address} onChange={e => setCompanyDetails(prev => ({ ...prev, address: e.target.value }))} style={{ minHeight: 60 }} /></Field>
          </Card>
          <Card>
            <h3 style={{ fontSize: 15, fontWeight: 700, margin: "0 0 20px", color: C.accent }}>🏦 Bank Details (for invoices)</h3>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 20px" }}>
              <Field label="Bank Name"><Input value={companyDetails.bankName} onChange={e => setCompanyDetails(prev => ({ ...prev, bankName: e.target.value }))} /></Field>
              <Field label="Account Number"><Input value={companyDetails.bankAccount} onChange={e => setCompanyDetails(prev => ({ ...prev, bankAccount: e.target.value }))} style={{ fontFamily: MONO }} /></Field>
              <Field label="IFSC Code"><Input value={companyDetails.bankIfsc} onChange={e => setCompanyDetails(prev => ({ ...prev, bankIfsc: e.target.value.toUpperCase() }))} style={{ fontFamily: MONO }} /></Field>
            </div>
          </Card>
          <Btn onClick={() => showToast("Company details saved")} style={{ justifyContent: "center" }}>💾 Save Company Details</Btn>
        </div>
      )}

      {tab === "printer" && (
        <div style={{ display: "grid", gap: 24, maxWidth: 600 }}>
          <Card><h3 style={{ fontSize: 15, fontWeight: 700, margin: "0 0 16px", color: C.accent }}>🖨️ Job Sheet Printer</h3>
            <Field label="Default Paper Size"><Select value={printerSettings.jobSheet.paperSize} onChange={e => onUpdate({ ...printerSettings, jobSheet: { ...printerSettings.jobSheet, paperSize: e.target.value } })}><option value="A4">A4 (210 × 297 mm)</option><option value="A5">A5 (148 × 210 mm)</option><option value="Letter">Letter (8.5 × 11 in)</option><option value="Legal">Legal (8.5 × 14 in)</option></Select></Field>
            <Field label="Default Copies"><Input type="number" min="1" max="10" value={printerSettings.jobSheet.copies} onChange={e => onUpdate({ ...printerSettings, jobSheet: { ...printerSettings.jobSheet, copies: parseInt(e.target.value) || 1 } })} /></Field>
          </Card>
          <Card><h3 style={{ fontSize: 15, fontWeight: 700, margin: "0 0 16px", color: C.accent }}>🏷️ Label Printer</h3>
            <Field label="Default Label Type"><Select value={printerSettings.label.type} onChange={e => onUpdate({ ...printerSettings, label: { ...printerSettings.label, type: e.target.value } })}><option value="qr">QR Code</option><option value="barcode">Barcode</option></Select></Field>
            <Field label="Default Label Size"><Select value={printerSettings.label.labelSize} onChange={e => onUpdate({ ...printerSettings, label: { ...printerSettings.label, labelSize: e.target.value } })}><option value="50x25">50 × 25 mm</option><option value="50x30">50 × 30 mm</option><option value="60x40">60 × 40 mm</option><option value="70x35">70 × 35 mm</option></Select></Field>
            <Field label="Default Copies"><Input type="number" min="1" max="20" value={printerSettings.label.copies} onChange={e => onUpdate({ ...printerSettings, label: { ...printerSettings.label, copies: parseInt(e.target.value) || 1 } })} /></Field>
          </Card>
        </div>
      )}

      {tab === "theme" && (
        <div style={{ maxWidth: 600 }}>
          <Card>
            <h3 style={{ fontSize: 15, fontWeight: 700, margin: "0 0 6px", color: C.accent }}>🎨 Application Theme</h3>
            <p style={{ fontSize: 12, color: C.textMuted, marginBottom: 20 }}>Choose your preferred accent color theme</p>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
              {themes.map(t => (
                <button key={t.id} onClick={() => { setTheme(t.id); showToast(`Theme set to ${t.label} (applies on next reload)`); }} style={{
                  padding: 16, borderRadius: 10, border: theme === t.id ? `2px solid ${t.accent}` : `1px solid ${C.border}`,
                  background: theme === t.id ? t.accent + "15" : C.surface2, cursor: "pointer", textAlign: "center", transition: "all 0.2s",
                }}>
                  <div style={{ width: 36, height: 36, borderRadius: 18, background: t.accent, margin: "0 auto 8px", boxShadow: theme === t.id ? `0 0 16px ${t.accent}44` : "none" }} />
                  <div style={{ fontSize: 13, fontWeight: 600, color: theme === t.id ? t.accent : C.textDim }}>{t.label}</div>
                  {theme === t.id && <div style={{ fontSize: 10, color: C.textMuted, marginTop: 4 }}>✓ Active</div>}
                </button>
              ))}
            </div>
          </Card>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  CREATE JOB MODAL (with accessories & service type)
// ═══════════════════════════════════════════════════════════════════════════
function CreateJobModal({ customers, deviceCategories, technicians, onSubmit, onClose, nextId }) {
  const [form, setForm] = useState({ customerId: "", deviceCategory: "", deviceBrand: "", deviceModel: "", serialNumber: "", problemDescription: "", assignedTo: "", serviceType: "Carry-In", accessories: [], customAccessories: "" });
  const [accSearch, setAccSearch] = useState("");
  const [showAccDropdown, setShowAccDropdown] = useState(false);
  const filteredAcc = ACCESSORY_OPTIONS.filter(a => !form.accessories.includes(a) && a.toLowerCase().includes(accSearch.toLowerCase()));
  const valid = form.customerId && form.deviceCategory && form.problemDescription;

  const toggleAcc = (acc) => setForm(prev => ({ ...prev, accessories: prev.accessories.includes(acc) ? prev.accessories.filter(a => a !== acc) : [...prev.accessories, acc] }));

  return (
    <Modal title="Create New Job Sheet" onClose={onClose} wide>
      <div style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 20, padding: "12px 16px", background: C.accentDim, borderRadius: 8 }}>
        <span style={{ fontSize: 12, color: C.textDim }}>Job ID:</span>
        <span style={{ fontFamily: MONO, fontSize: 16, fontWeight: 700, color: C.accent }}>{nextId}</span>
      </div>

      {/* Service Type Toggle */}
      <Field label="Service Type" required>
        <div style={{ display: "flex", gap: 0, borderRadius: 8, overflow: "hidden", border: `1px solid ${C.border}` }}>
          {SERVICE_TYPES.map(t => (
            <button key={t} onClick={() => setForm({ ...form, serviceType: t })} style={{ flex: 1, padding: "12px 16px", border: "none", cursor: "pointer", fontFamily: FONT, fontSize: 14, fontWeight: 600, background: form.serviceType === t ? (t === "On-Site" ? C.warning : C.accent) : C.surface2, color: form.serviceType === t ? C.bg : C.textMuted, transition: "all 0.2s" }}>
              {t === "Carry-In" ? "🏪 Carry-In" : "🏭 On-Site"}
            </button>
          ))}
        </div>
      </Field>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 20px" }}>
        <Field label="Customer" required><Select value={form.customerId} onChange={e => setForm({ ...form, customerId: e.target.value })}><option value="">Select Customer</option>{customers.map(c => <option key={c.id} value={c.id}>{c.name} {c.gstNo ? `(GST: ${c.gstNo})` : ""}</option>)}</Select></Field>
        <Field label="Equipment Category" required><Select value={form.deviceCategory} onChange={e => setForm({ ...form, deviceCategory: e.target.value })}><option value="">Select Category</option>{deviceCategories.map(d => <option key={d.id} value={d.id}>{d.icon} {d.name}</option>)}</Select></Field>
        <Field label="Make / Brand"><Input value={form.deviceBrand} onChange={e => setForm({ ...form, deviceBrand: e.target.value })} placeholder="e.g. ABB, Siemens, Yaskawa" /></Field>
        <Field label="Model No."><Input value={form.deviceModel} onChange={e => setForm({ ...form, deviceModel: e.target.value })} placeholder="e.g. ACS580, KTP700" /></Field>
        <Field label="Serial Number"><Input value={form.serialNumber} onChange={e => setForm({ ...form, serialNumber: e.target.value })} placeholder="Equipment serial number" /></Field>
        <Field label="Assign Technician"><Select value={form.assignedTo} onChange={e => setForm({ ...form, assignedTo: e.target.value })}><option value="">Assign Later</option>{technicians.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}</Select></Field>
      </div>

      <Field label="Problem / Fault Description" required><TextArea value={form.problemDescription} onChange={e => setForm({ ...form, problemDescription: e.target.value })} placeholder="Describe the fault, error codes, symptoms in detail..." /></Field>

      {/* ACCESSORIES SECTION */}
      <div style={{ border: `1px solid ${C.border}`, borderRadius: 10, padding: 16, marginBottom: 16, background: C.surface2 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.textDim, textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 12 }}>📎 Accessories Received With Equipment</div>
        {form.accessories.length > 0 && (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 12 }}>
            {form.accessories.map(acc => (
              <span key={acc} style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "5px 12px", background: C.accent + "20", borderRadius: 6, fontSize: 12, color: C.accent, fontWeight: 500 }}>
                {acc}<button onClick={() => toggleAcc(acc)} style={{ background: "none", border: "none", cursor: "pointer", color: C.accent, fontSize: 16, lineHeight: 1, padding: 0 }}>×</button>
              </span>
            ))}
          </div>
        )}
        <div style={{ position: "relative" }}>
          <Input value={accSearch} onChange={e => { setAccSearch(e.target.value); setShowAccDropdown(true); }} onFocus={() => setShowAccDropdown(true)} placeholder="Search or select accessories..." style={{ background: C.surface }} />
          {showAccDropdown && filteredAcc.length > 0 && (
            <div style={{ position: "absolute", top: "100%", left: 0, right: 0, maxHeight: 200, overflow: "auto", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, marginTop: 4, zIndex: 10, boxShadow: "0 8px 24px rgba(0,0,0,0.4)" }}>
              {filteredAcc.slice(0, 12).map(acc => (
                <div key={acc} onClick={() => { toggleAcc(acc); setAccSearch(""); }} style={{ padding: "8px 14px", fontSize: 13, cursor: "pointer", color: C.text, borderBottom: `1px solid ${C.border}08` }} onMouseEnter={e => e.target.style.background = C.surface2} onMouseLeave={e => e.target.style.background = "transparent"}>{acc}</div>
              ))}
              <div onClick={() => setShowAccDropdown(false)} style={{ padding: "6px 14px", fontSize: 11, color: C.textMuted, cursor: "pointer", textAlign: "center", borderTop: `1px solid ${C.border}` }}>Close ↑</div>
            </div>
          )}
        </div>
        <div style={{ marginTop: 10 }}><Input value={form.customAccessories} onChange={e => setForm({ ...form, customAccessories: e.target.value })} placeholder="Other accessories not in list (type manually)..." style={{ background: C.surface, fontSize: 12 }} /></div>
      </div>

      <div style={{ display: "flex", gap: 12, justifyContent: "flex-end", marginTop: 8 }}>
        <Btn variant="secondary" onClick={onClose}>Cancel</Btn>
        <Btn onClick={() => { setShowAccDropdown(false); onSubmit(form); }} disabled={!valid}>Create Job Sheet</Btn>
      </div>
    </Modal>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  VIEW / EDIT JOB MODAL
// ═══════════════════════════════════════════════════════════════════════════
function ViewJobModal({ job, user, getCustomer, getUser, getDevice, onClose, onUpdate, onPrint, technicians }) {
  const cust = getCustomer(job.customerId); const dev = getDevice(job.deviceCategory); const tech = getUser(job.assignedTo); const creator = getUser(job.createdBy);
  const isTech = user.role === ROLES.TECHNICIAN; const canEdit = can(user.role, "all") || isTech;
  const [editInspection, setEditInspection] = useState(false);
  const [editEstimate, setEditEstimate] = useState(false);
  const [inspection, setInspection] = useState(job.inspectionReport);
  const [estimate, setEstimate] = useState(job.estimate);
  const [notes, setNotes] = useState(job.notes);
  const statusIdx = STATUS_FLOW.indexOf(job.status);
  const nextStatus = statusIdx < STATUS_FLOW.length - 1 ? STATUS_FLOW[statusIdx + 1] : null;
  const allAcc = [...(job.accessories || []), ...(job.customAccessories ? [job.customAccessories] : [])];

  return (
    <Modal title={`Job Sheet — ${job.id}`} onClose={onClose} wide>
      {/* Status Bar */}
      <div style={{ display: "flex", gap: 4, marginBottom: 20, overflow: "auto", padding: "0 0 8px" }}>
        {STATUS_FLOW.map((s, i) => (
          <div key={s} style={{ flex: 1, padding: "8px 4px", textAlign: "center", fontSize: 10, fontWeight: 700, borderRadius: 6, background: i <= statusIdx ? STATUS_COLORS[s] + "22" : C.surface2, color: i <= statusIdx ? STATUS_COLORS[s] : C.textMuted, whiteSpace: "nowrap", border: s === job.status ? `2px solid ${STATUS_COLORS[s]}` : "2px solid transparent", textTransform: "uppercase", letterSpacing: 0.5 }}>{s}</div>
        ))}
      </div>

      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        <Badge label={job.serviceType || "Carry-In"} color={job.serviceType === "On-Site" ? C.warning : C.accent} />
        <Badge label={job.status} color={STATUS_COLORS[job.status]} />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
        <Card style={{ padding: 16 }}>
          <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 700, textTransform: "uppercase", marginBottom: 10 }}>Customer / Company</div>
          <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 2 }}>{cust?.name}</div>
          {cust?.contactPerson && <div style={{ fontSize: 13, color: C.textDim, marginBottom: 2 }}>👤 {cust.contactPerson}</div>}
          <div style={{ fontSize: 13, color: C.textDim }}>{cust?.phone} · {cust?.email}</div>
          <div style={{ fontSize: 12, color: C.textMuted, marginTop: 4 }}>{cust?.address}</div>
          {cust?.gstNo && <div style={{ display: "inline-flex", gap: 6, padding: "3px 8px", background: C.surface2, borderRadius: 4, marginTop: 8, alignItems: "center" }}><span style={{ fontSize: 10, fontWeight: 700, color: C.textMuted }}>GST</span><span style={{ fontSize: 12, fontFamily: MONO, fontWeight: 600, color: C.text }}>{cust.gstNo}</span></div>}
        </Card>
        <Card style={{ padding: 16 }}>
          <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 700, textTransform: "uppercase", marginBottom: 10 }}>Equipment</div>
          <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 2 }}>{dev?.icon} {dev?.name}</div>
          <div style={{ fontSize: 13, color: C.textDim }}>{job.deviceBrand} {job.deviceModel}</div>
          <div style={{ fontSize: 12, color: C.textMuted, fontFamily: MONO, marginTop: 4 }}>S/N: {job.serialNumber || "—"}</div>
        </Card>
      </div>

      {allAcc.length > 0 && (
        <Card style={{ padding: 16, marginBottom: 16 }}>
          <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 700, textTransform: "uppercase", marginBottom: 10 }}>📎 Accessories Received</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>{allAcc.map((acc, i) => (<span key={i} style={{ padding: "4px 10px", background: C.surface2, borderRadius: 6, fontSize: 12, color: C.text }}>{acc}</span>))}</div>
        </Card>
      )}

      <Card style={{ padding: 16, marginBottom: 16 }}><div style={{ fontSize: 11, color: C.textMuted, fontWeight: 700, textTransform: "uppercase", marginBottom: 8 }}>Problem / Fault Description</div><div style={{ fontSize: 14, color: C.text, lineHeight: 1.5 }}>{job.problemDescription}</div></Card>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
        <Card style={{ padding: 16 }}>
          <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 700, textTransform: "uppercase", marginBottom: 8 }}>Assigned Technician</div>
          {can(user.role, "all") ? (<Select value={job.assignedTo || ""} onChange={e => onUpdate({ assignedTo: e.target.value, status: job.status === "Created" && e.target.value ? "Assigned" : job.status })}><option value="">Unassigned</option>{technicians.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}</Select>) : (<div style={{ fontSize: 14, fontWeight: 600 }}>{tech?.name || "Unassigned"}</div>)}
        </Card>
        <Card style={{ padding: 16 }}><div style={{ fontSize: 11, color: C.textMuted, fontWeight: 700, textTransform: "uppercase", marginBottom: 8 }}>Created</div><div style={{ fontSize: 14 }}>{new Date(job.createdAt).toLocaleDateString("en-IN", { day: "2-digit", month: "long", year: "numeric" })}</div><div style={{ fontSize: 12, color: C.textMuted, marginTop: 2 }}>by {creator?.name}</div></Card>
      </div>

      {/* Inspection */}
      <Card style={{ padding: 16, marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 700, textTransform: "uppercase" }}>Inspection / Diagnostic Report</div>
          {(isTech || can(user.role, "all")) && !editInspection && <Btn variant="ghost" small onClick={() => setEditInspection(true)}>Edit</Btn>}
        </div>
        {editInspection ? (<div><TextArea value={inspection} onChange={e => setInspection(e.target.value)} placeholder="Enter inspection findings, fault diagnosis..." /><div style={{ display: "flex", gap: 8, marginTop: 8, justifyContent: "flex-end" }}><Btn variant="secondary" small onClick={() => { setEditInspection(false); setInspection(job.inspectionReport); }}>Cancel</Btn><Btn small onClick={() => { onUpdate({ inspectionReport: inspection }); setEditInspection(false); }}>Save</Btn></div></div>)
        : (<div style={{ fontSize: 14, color: job.inspectionReport ? C.text : C.textMuted, lineHeight: 1.5 }}>{job.inspectionReport || "Not yet submitted"}</div>)}
      </Card>

      {/* Estimate */}
      <Card style={{ padding: 16, marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 700, textTransform: "uppercase" }}>Estimate</div>
          {(isTech || can(user.role, "all")) && !editEstimate && <Btn variant="ghost" small onClick={() => setEditEstimate(true)}>Edit</Btn>}
        </div>
        {editEstimate ? (<div><Input type="number" value={estimate} onChange={e => setEstimate(parseInt(e.target.value) || 0)} placeholder="Enter amount in ₹" /><div style={{ display: "flex", gap: 8, marginTop: 8, justifyContent: "flex-end" }}><Btn variant="secondary" small onClick={() => { setEditEstimate(false); setEstimate(job.estimate); }}>Cancel</Btn><Btn small onClick={() => { onUpdate({ estimate }); setEditEstimate(false); }}>Save</Btn></div></div>)
        : (<div style={{ fontSize: 20, fontWeight: 800, color: job.estimate ? C.success : C.textMuted, fontFamily: MONO }}>{job.estimate ? `₹${job.estimate.toLocaleString("en-IN")}` : "Not set"}</div>)}
      </Card>

      {/* Notes */}
      <Card style={{ padding: 16, marginBottom: 20 }}>
        <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 700, textTransform: "uppercase", marginBottom: 8 }}>Notes</div>
        {canEdit ? (<div><TextArea value={notes} onChange={e => setNotes(e.target.value)} placeholder="Add notes..." />{notes !== job.notes && <div style={{ display: "flex", gap: 8, marginTop: 8, justifyContent: "flex-end" }}><Btn small onClick={() => onUpdate({ notes })}>Save Notes</Btn></div>}</div>)
        : (<div style={{ fontSize: 14, color: job.notes ? C.text : C.textMuted }}>{job.notes || "No notes"}</div>)}
      </Card>

      <div style={{ display: "flex", gap: 12, justifyContent: "space-between", flexWrap: "wrap" }}>
        <div>{can(user.role, "all") && <Btn variant="secondary" onClick={onPrint}>🖨️ Print Job Sheet</Btn>}</div>
        <div style={{ display: "flex", gap: 8 }}>
          {nextStatus && (isTech || can(user.role, "all")) && <Btn variant="success" onClick={() => onUpdate({ status: nextStatus })}>Advance → {nextStatus}</Btn>}
          <Btn variant="secondary" onClick={onClose}>Close</Btn>
        </div>
      </div>
    </Modal>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  ADD CUSTOMER MODAL (with GST)
// ═══════════════════════════════════════════════════════════════════════════
function AddCustomerModal({ onSubmit, onClose }) {
  const [form, setForm] = useState({ name: "", contactPerson: "", phone: "", email: "", address: "", gstNo: "" });
  return (
    <Modal title="Add Customer" onClose={onClose}>
      <Field label="Company / Customer Name" required><Input value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="Company or individual name" /></Field>
      <Field label="Contact Person"><Input value={form.contactPerson} onChange={e => setForm({ ...form, contactPerson: e.target.value })} placeholder="Primary contact person" /></Field>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 16px" }}>
        <Field label="Phone" required><Input value={form.phone} onChange={e => setForm({ ...form, phone: e.target.value })} placeholder="10-digit number" /></Field>
        <Field label="Email"><Input type="email" value={form.email} onChange={e => setForm({ ...form, email: e.target.value })} placeholder="email@company.com" /></Field>
      </div>
      <Field label="GST Number"><Input value={form.gstNo} onChange={e => setForm({ ...form, gstNo: e.target.value.toUpperCase() })} placeholder="e.g. 18AABCU9603R1ZM" maxLength={15} style={{ fontFamily: MONO, letterSpacing: 1 }} /><div style={{ fontSize: 11, color: C.textMuted, marginTop: 4 }}>15-digit GSTIN (optional)</div></Field>
      <Field label="Address"><TextArea value={form.address} onChange={e => setForm({ ...form, address: e.target.value })} placeholder="Full address with PIN code" /></Field>
      <div style={{ display: "flex", gap: 12, justifyContent: "flex-end", marginTop: 8 }}><Btn variant="secondary" onClick={onClose}>Cancel</Btn><Btn onClick={() => onSubmit(form)} disabled={!form.name || !form.phone}>Add Customer</Btn></div>
    </Modal>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  ADD EQUIPMENT CATEGORY MODAL
// ═══════════════════════════════════════════════════════════════════════════
function AddDeviceCategoryModal({ onSubmit, onClose }) {
  const [form, setForm] = useState({ name: "", icon: "⚡" });
  const icons = ["⚡", "⚙️", "🔲", "🖥️", "🔌", "🔋", "🔧", "🏭", "📦", "📡", "🔀", "🌡️", "⏱️", "🔗", "📊", "📺", "🎛️", "💡", "💻", "🔩"];
  return (
    <Modal title="Add Equipment Category" onClose={onClose}>
      <Field label="Category Name" required><Input value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="e.g. Stepper Motor, PID Controller" /></Field>
      <Field label="Icon"><div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>{icons.map(ic => (<button key={ic} onClick={() => setForm({ ...form, icon: ic })} style={{ width: 40, height: 40, borderRadius: 8, border: form.icon === ic ? `2px solid ${C.accent}` : `1px solid ${C.border}`, background: form.icon === ic ? C.accentDim : C.surface2, fontSize: 20, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>{ic}</button>))}</div></Field>
      <div style={{ display: "flex", gap: 12, justifyContent: "flex-end", marginTop: 8 }}><Btn variant="secondary" onClick={onClose}>Cancel</Btn><Btn onClick={() => onSubmit(form)} disabled={!form.name}>Add Category</Btn></div>
    </Modal>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  PRINT LABEL MODAL
// ═══════════════════════════════════════════════════════════════════════════
function PrintLabelModal({ job, settings, onClose }) {
  const [type, setType] = useState(settings.type);
  const [copies, setCopies] = useState(settings.copies);
  const [labelSize, setLabelSize] = useState(settings.labelSize);
  const handlePrint = () => {
    const [lw, lh] = labelSize.split("x").map(Number);
    const labelHtml = `<div style="text-align:center;padding:10px;font-family:Arial,sans-serif;">
      <div style="font-size:16px;font-weight:700;margin-bottom:6px;">${job.id}</div>
      ${type === "qr" ? `<svg width="100" height="100" viewBox="0 0 120 120"><rect width="120" height="120" fill="white"/>${generateQRMatrix(job.id).map((row, i) => row.map((cell, j) => cell ? `<rect x="${j*(120/21)}" y="${i*(120/21)}" width="${120/21}" height="${120/21}" fill="black"/>` : "").join("")).join("")}</svg>` : `<div style="font-family:monospace;font-size:12px;letter-spacing:2px;margin:10px 0;">${job.id}</div>`}
      <div style="font-size:10px;color:#666;margin-top:6px;">${job.serviceType || "Carry-In"} | Scan to view</div>
      <div style="font-size:9px;color:#999;margin-top:2px;">Label: ${lw}×${lh}mm · Copies: ${copies}</div>
    </div>`;
    printContent(labelHtml, `Label - ${job.id}`);
  };
  return (
    <Modal title={`Print Label — ${job.id}`} onClose={onClose}>
      <div style={{ display: "flex", justifyContent: "center", marginBottom: 24, padding: 24, background: "#fff", borderRadius: 8 }}>{type === "qr" ? <QRCode text={job.id} size={140} /> : <Barcode text={job.id} width={220} height={70} />}</div>
      <Field label="Label Type"><Select value={type} onChange={e => setType(e.target.value)}><option value="qr">QR Code</option><option value="barcode">Barcode</option></Select></Field>
      <Field label="Label Size"><Select value={labelSize} onChange={e => setLabelSize(e.target.value)}><option value="50x25">50 × 25 mm</option><option value="50x30">50 × 30 mm</option><option value="60x40">60 × 40 mm</option><option value="70x35">70 × 35 mm</option></Select></Field>
      <Field label="Number of Copies"><Input type="number" min="1" max="20" value={copies} onChange={e => setCopies(parseInt(e.target.value) || 1)} /></Field>
      <div style={{ display: "flex", gap: 12, justifyContent: "flex-end", marginTop: 12 }}><Btn variant="secondary" onClick={onClose}>Cancel</Btn><Btn onClick={handlePrint}>🏷️ Print {copies} Label{copies > 1 ? "s" : ""}</Btn></div>
    </Modal>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  MY PASSWORD MODAL (available to ALL roles from sidebar)
// ═══════════════════════════════════════════════════════════════════════════
function MyPasswordModal({ user, users, setUsers, onClose, showToast }) {
  const [currentPw, setCurrentPw] = useState("");
  const [newPw, setNewPw] = useState("");
  const [confirmPw, setConfirmPw] = useState("");
  const [error, setError] = useState("");
  const [showCurrent, setShowCurrent] = useState(false);
  const [showNew, setShowNew] = useState(false);

  const passwordStrength = (pw) => {
    if (!pw) return { label: "", color: "", percent: 0 };
    let score = 0;
    if (pw.length >= 4) score++;
    if (pw.length >= 8) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    if (score <= 1) return { label: "Weak", color: C.danger, percent: 20 };
    if (score <= 2) return { label: "Fair", color: C.warning, percent: 40 };
    if (score <= 3) return { label: "Good", color: "#f59e0b", percent: 60 };
    if (score <= 4) return { label: "Strong", color: C.success, percent: 80 };
    return { label: "Very Strong", color: "#059669", percent: 100 };
  };

  const strength = passwordStrength(newPw);
  const match = newPw && confirmPw && newPw === confirmPw;
  const mismatch = newPw && confirmPw && newPw !== confirmPw;

  const handleSubmit = () => {
    setError("");
    const realUser = users.find(u => u.id === user.id);
    if (!realUser) { setError("User not found"); return; }
    if (currentPw !== realUser.password) { setError("Current password is incorrect"); return; }
    if (newPw.length < 4) { setError("New password must be at least 4 characters"); return; }
    if (newPw === currentPw) { setError("New password must be different from current password"); return; }
    if (newPw !== confirmPw) { setError("New passwords do not match"); return; }
    setUsers(prev => prev.map(u => u.id === user.id ? { ...u, password: newPw } : u));
    showToast("Password changed successfully! Use new password on next login.");
    onClose();
  };

  const getRoleColor = (role) => role === ROLES.ADMIN ? C.danger : role === ROLES.MANAGER ? C.warning : role === ROLES.FRONT_DESK ? "#8b5cf6" : C.accent;

  return (
    <Modal title="Change My Password" onClose={onClose}>
      {/* User Info */}
      <div style={{ display: "flex", gap: 14, alignItems: "center", padding: "14px 16px", background: C.surface2, borderRadius: 10, marginBottom: 24 }}>
        <div style={{ width: 48, height: 48, borderRadius: 24, background: getRoleColor(user.role) + "22", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, fontWeight: 700, color: getRoleColor(user.role) }}>{user.name[0]}</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 700, fontSize: 15 }}>{user.name}</div>
          <div style={{ fontSize: 12, color: C.textMuted, fontFamily: MONO }}>{user.email}</div>
        </div>
        <Badge label={ROLE_LABELS[user.role]} color={getRoleColor(user.role)} />
      </div>

      {/* Current Password */}
      <Field label="Current Password" required>
        <div style={{ position: "relative" }}>
          <Input type={showCurrent ? "text" : "password"} value={currentPw} onChange={e => { setCurrentPw(e.target.value); setError(""); }} placeholder="Enter your current password" style={{ paddingRight: 44 }} />
          <button onClick={() => setShowCurrent(!showCurrent)} style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", cursor: "pointer", color: C.textMuted, fontSize: 12, fontFamily: FONT }}>{showCurrent ? "Hide" : "Show"}</button>
        </div>
      </Field>

      {/* Divider */}
      <div style={{ height: 1, background: C.border, margin: "8px 0 20px" }} />

      {/* New Password */}
      <Field label="New Password" required>
        <div style={{ position: "relative" }}>
          <Input type={showNew ? "text" : "password"} value={newPw} onChange={e => { setNewPw(e.target.value); setError(""); }} placeholder="Enter new password (min 4 chars)" style={{ paddingRight: 44 }} />
          <button onClick={() => setShowNew(!showNew)} style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", cursor: "pointer", color: C.textMuted, fontSize: 12, fontFamily: FONT }}>{showNew ? "Hide" : "Show"}</button>
        </div>
        {/* Strength meter */}
        {newPw && (
          <div style={{ marginTop: 8 }}>
            <div style={{ height: 4, borderRadius: 2, background: C.surface2, overflow: "hidden" }}>
              <div style={{ height: "100%", width: strength.percent + "%", background: strength.color, borderRadius: 2, transition: "all 0.3s" }} />
            </div>
            <div style={{ fontSize: 11, color: strength.color, fontWeight: 600, marginTop: 4 }}>Strength: {strength.label}</div>
          </div>
        )}
      </Field>

      {/* Confirm New Password */}
      <Field label="Confirm New Password" required>
        <Input type="password" value={confirmPw} onChange={e => { setConfirmPw(e.target.value); setError(""); }} placeholder="Re-enter new password" onKeyDown={e => e.key === "Enter" && handleSubmit()} />
      </Field>

      {/* Match/Mismatch indicators */}
      {match && <div style={{ display: "flex", alignItems: "center", gap: 6, color: C.success, fontSize: 12, marginBottom: 12 }}><Icon d={Icons.check} size={14} color={C.success} /> Passwords match</div>}
      {mismatch && <div style={{ display: "flex", alignItems: "center", gap: 6, color: C.danger, fontSize: 12, marginBottom: 12 }}><Icon d={Icons.x} size={14} color={C.danger} /> Passwords do not match</div>}

      {/* Error */}
      {error && <div style={{ color: C.danger, fontSize: 13, marginBottom: 16, padding: "10px 14px", background: C.danger + "12", borderRadius: 8, display: "flex", alignItems: "center", gap: 8 }}><span style={{ fontSize: 16 }}>⚠️</span> {error}</div>}

      {/* Tips */}
      <div style={{ padding: 12, background: C.surface2, borderRadius: 8, marginBottom: 20, fontSize: 12, color: C.textMuted, lineHeight: 1.6 }}>
        <span style={{ fontWeight: 600, color: C.textDim }}>Password tips:</span> Use at least 8 characters with uppercase letters, numbers, and special characters for a strong password.
      </div>

      <div style={{ display: "flex", gap: 12, justifyContent: "flex-end" }}>
        <Btn variant="secondary" onClick={onClose}>Cancel</Btn>
        <Btn onClick={handleSubmit} disabled={!currentPw || !newPw || !confirmPw}>🔑 Change Password</Btn>
      </div>
    </Modal>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(CRMApp));
  </script>
</body>
</html>
